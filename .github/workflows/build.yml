name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git rev-list --count에 전체 히스토리 필요

      - name: Host tests
        run: |
          cmake -S . -B build-host -DHOST_TEST=ON
          cmake --build build-host
          ctest --test-dir build-host --output-on-failure
        shell: bash

      - name: Build firmware
        run: idf.py build
        shell: bash
