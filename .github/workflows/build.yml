name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build host tests
        run: cmake -S . -B build-host -DHOST_TEST=ON
        shell: bash

      - name: Run host tests
        run: cmake --build build-host && ctest --test-dir build-host --output-on-failure
        shell: bash

      - name: Extract version from tag
        id: version
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        run: idf.py -DPROJECT_VER=${{ steps.version.outputs.ver }} build
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/doorman.bin
            build/doorman.elf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            build/doorman.bin
            build/doorman.elf
