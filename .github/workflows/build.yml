name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Host tests
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cmake -S . -B build-host -DHOST_TEST=ON
          cmake --build build-host
          ctest --test-dir build-host --output-on-failure

      - name: Build firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          idf.py build
