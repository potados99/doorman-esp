<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <title>Preact Practice</title>
</head>
<body>

<script type="module">
    /**
     * 빌드 없이 하나의 파일로 모던 React 애플리케이션을 만들어보기 위한 실험입니다.
     * - React 개발 경험을 plain html에서 재현하기 위해 Preact + htm을 사용하였습니다.
     * - 하나의 파일에서 모듈 개념을 재현하기 위해 컴포넌트를 플랫하게 나열하는 대신
     *   IIFE로 디렉토리/파일/컴포넌트 트리를 구성하였습니다.
     *
     * 파일 구조는 세 단위로 나뉩니다
     * - 글로벌 import + 초기화 섹션
     * - 모듈 정의 섹션
     * - 이외 보일러플레이트 섹션
     *
     * 한계:
     * - htm의 표현이 tsx의 그것과 다릅니다.
     * - typescript 못 씁니다.
     * - 모듈 정의 순서에 의존성이 있습니다(호이스팅 안 됨).
     */

    import {h, render} from 'https://esm.sh/preact';
    import {useState} from 'https://esm.sh/preact/hooks';
    import htm from 'https://esm.sh/htm';
    import {
        QueryClient,
        QueryClientProvider,
        useQuery
    } from 'https://esm.sh/@tanstack/preact-query';

    const html = htm.bind(h);
    const queryClient = new QueryClient();

    const data = (() => {
        const users = (() => {
            async function fetchUsers() {
                return fetch('https://jsonplaceholder.typicode.com/users').then(res => res.json());
            }

            return {fetchUsers};
        })();

        return {users};
    })();

    const tabs = (() => {
        const List = (() => {
            function ListTab() {
                const users = useQuery({queryKey: ['users'], queryFn: data.users.fetchUsers});

                if (users.isPending) {
                    return html`
                        <article aria-busy="true">Loading...</article>`;
                } else if (users.isError) {
                    return html`
                        <article aria-live="assertive">Error: ${users.error.message}</article>`;
                } else if (users.data?.length === 0) {
                    return html`
                        <p>No data</p>`;
                } else {
                    return html`
                        <section>
                            <div>
                                ${users.data?.map(item => html`
                                    <${ListItem} key=${item.id} ...${item}/>`)}
                            </div>
                        </section>`;
                }
            }

            function ListItem({name, username, email}) {
                return html`
                    <article>
                        <hgroup>
                            <h3>${name}</h3>
                            <p>@${username}</p>
                        </hgroup>
                        <p><a href="mailto:${email}">${email}</a></p>
                    </article>`;
            }

            return {ListTab};
        })();

        const Settings = (() => {
            function SettingsTab() {
                const [count, setCount] = useState(0);

                return html`
                    <section>
                        Settings

                        <button onClick=${() => setCount(count + 1)}>Count: ${count}</button>
                    </section>`;
            }

            return {SettingsTab};
        })();

        return {List, Settings};
    })();

    const Main = (() => {
        const {ListTab} = tabs.List;
        const {SettingsTab} = tabs.Settings;

        function MainPage() {
            const [currentTab, setCurrentTab] = useState('list');

            return html`
                <div>
                    <header>
                        <h1>Preact Practice</h1>
                        <nav>
                            <ul>
                                <li>
                                    <button
                                        onClick=${() => setCurrentTab('list')}
                                        aria-current=${currentTab === 'list' ? 'page' : undefined}>
                                        List
                                    </button>
                                </li>
                                <li>
                                    <button
                                        onClick=${() => setCurrentTab('settings')}
                                        aria-current=${currentTab === 'settings' ? 'page' : undefined}>
                                        Settings
                                    </button>
                                </li>
                            </ul>
                        </nav>
                    </header>
                    ${currentTab === 'list' ?
                            html`
                                <${ListTab}/>` :
                            html`
                                <${SettingsTab}/>`}
                </div>`;
        }

        return {MainPage};
    })();

    const index = (() => {
        const {MainPage} = Main;

        function App() {
            return html`
                <${QueryClientProvider} client=${queryClient}>
                    <main class="container">
                        <${MainPage}/>
                    </main>
                </>
            `;
        }

        return {App};
    })();

    render(html`
        <${index.App}/>`, document.body);
</script>
</body>
</html>
