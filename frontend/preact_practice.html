<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preact Practice</title>
</head>
<body>

<script type="module">
    /**
     * 빌드 없이 하나의 파일로 모던 React 애플리케이션을 만들어보기 위한 실험입니다.
     * - React 개발 경험을 plain html에서 재현하기 위해 Preact + htm을 사용하였습니다.
     * - 하나의 파일에서 모듈 개념을 재현하기 위해 컴포넌트를 플랫하게 나열하는 대신
     *   IIFE로 디렉토리/파일/컴포넌트 트리를 구성하였습니다.
     *
     * 파일 구조는 세 단위로 나뉩니다
     * - 글로벌 import 섹션
     * - 모듈 정의 섹션
     * - 이외 보일러플레이트 섹션
     *
     * 한계:
     * - htm의 표현이 tsx의 그것과 다릅니다.
     * - typescript 못 씁니다.
     * - 모듈 정의 순서에 의존성이 있습니다(호이스팅 안 됨).
     */

    import {html, render, useState} from 'https://esm.sh/htm/preact/standalone'

    const tabs = (() => {
        const List = (() => {
            function ListTab() {
                const items = [
                    {title: 'Item 1', description: 'Description 1'},
                    {title: 'Item 2', description: 'Description 2'},
                    {title: 'Item 3', description: 'Description 3'},
                ];

                return html`
                <div>
                    <ul>
                        ${items.map(item => html`
                            <${ListItem} ...${item}/>`)}
                    </ul>
                </div>`;
            }

            function ListItem({title, description}) {
                return html`
                <li>
                    <h2>${title}</h2>
                    <p>${description}</p>
                </li>`;
            }

            return {ListTab};
        })();

        const Settings = (() => {
            function SettingsTab() {
                const [count, setCount] = useState(0);

                return html`
                <div>
                    Settings

                    <button onClick=${() => setCount(count + 1)}>Count: ${count}</button>
                </div>`;
            }

            return {SettingsTab};
        })();

        return {List, Settings};
    })();

    const Main = (() => {
        const {ListTab} = tabs.List;
        const {SettingsTab} = tabs.Settings;

        function MainPage() {
            const [currentTab, setCurrentTab] = useState('list');

            return html`
                <div>
                    <button onClick=${() => setCurrentTab('list')}>List</button>
                    <button onClick=${() => setCurrentTab('settings')}>Settings</button>

                    ${currentTab === 'list' ?
                html`
                                <${ListTab}/>` :
                html`
                                <${SettingsTab}/>`}
                </div>`;
        }

        return {MainPage};
    })();

    const index = (() => {
        const {MainPage} = Main;

        function App() {
            return html`
            <${MainPage}/>
        `;
        }

        return {App};
    })();

    render(html`<${index.App}/>`, document.body);
</script>
</body>
</html>
