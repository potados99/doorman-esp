<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doorman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scrollbar-gutter: stable; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.55;
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ── Header ── */
        .hdr { margin-bottom: 20px; }
        .hdr h1 { font-size: 1.5rem; font-weight: 700; }
        .hdr-meta { font-size: 0.72rem; color: #9ca3af; margin-top: 2px; }
        .hdr-meta a { color: #9ca3af; text-decoration: none; }
        .hdr-meta a:hover { color: #6b7280; }

        /* ── Tabs — underline, web-native ── */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #e5e7eb; margin-bottom: 20px; }
        .tab {
            -webkit-appearance: none; appearance: none;
            background: none; border: none; border-bottom: 2px solid transparent;
            padding: 6px 0 10px; margin-bottom: -1px;
            font: inherit; font-size: 0.88rem; font-weight: 600;
            color: #9ca3af; cursor: pointer;
        }
        .tab.active { color: #111; border-bottom-color: #111; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Primary action ── */
        .door-btn {
            display: block; width: 100%;
            padding: 16px;
            background: #16a34a; color: #fff;
            border: none; border-radius: 8px;
            font: inherit; font-size: 1.05rem; font-weight: 700;
            cursor: pointer;
            transition: background 0.12s;
        }
        .door-btn:active { background: #15803d; }

        /* ── Toggle pill ── */
        .auto-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 14px; padding: 12px 14px;
            border: 1px solid #e5e7eb; border-radius: 8px;
        }
        .auto-row span { font-size: 0.88rem; color: #374151; }
        .pill {
            width: auto; padding: 5px 14px; margin: 0;
            border: none; border-radius: 99px;
            font: inherit; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 0.3px; cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pill.off { background: #f3f4f6; color: #9ca3af; }
        .pill.on { background: #16a34a; color: #fff; }

        /* ── Section ── */
        .section { margin-top: 24px; }
        .section-title {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            color: #9ca3af; margin-bottom: 10px;
        }

        /* ── Card ── */
        .card {
            border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 14px; margin-bottom: 10px;
        }
        .card-label {
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.4px;
            color: #9ca3af; margin-bottom: 10px;
        }

        /* ── Status ── */
        .status { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 0.82rem; display: none; }
        .ok { background: #ecfdf5; color: #065f46; }
        .err { background: #fef2f2; color: #991b1b; }
        .run { background: #eff6ff; color: #1e40af; }

        /* ── Inputs ── */
        label { display: block; font-size: 0.78rem; font-weight: 500; color: #6b7280; margin: 10px 0 3px; }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 9px 10px;
            border: 1px solid #e5e7eb; border-radius: 6px;
            font: inherit; font-size: 0.88rem;
            background: #f9fafb; color: #111;
        }
        input:focus { outline: none; border-color: #2563eb; }
        input[type="file"] { width: 100%; font-size: 0.82rem; margin-top: 4px; }

        /* ── Buttons ── */
        .btn {
            -webkit-appearance: none; appearance: none;
            display: block; width: 100%; padding: 10px;
            border: none; border-radius: 6px;
            font: inherit; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; margin-top: 10px;
            transition: opacity 0.12s;
        }
        .btn:active { opacity: 0.7; }
        .btn-blue { background: #2563eb; color: #fff; }
        .btn-red { background: #dc2626; color: #fff; }
        .btn-orange { background: #ea580c; color: #fff; }
        .btn-green { background: #16a34a; color: #fff; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        progress { width: 100%; height: 4px; margin-top: 8px; display: none; border-radius: 2px; }
        .hint { font-size: 0.75rem; color: #9ca3af; line-height: 1.45; margin-bottom: 6px; }

        /* ── Safe mode banner ── */
        .safe-banner {
            background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px;
            padding: 10px 12px; margin-bottom: 16px;
            font-size: 0.82rem; color: #991b1b; line-height: 1.5;
        }

        /* ── Device list ── */
        .dev-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid #f3f4f6;
            font-family: 'Menlo', 'Consolas', monospace; font-size: 0.78rem; color: #6b7280;
        }
        .dev-row:last-child { border-bottom: none; }
        .dev-row button { width: auto; margin: 0; padding: 4px 10px; font-size: 0.72rem; border-radius: 4px; }
        #deviceList:empty::after { content: '등록된 기기 없음'; color: #d1d5db; font-size: 0.82rem; font-family: system-ui, sans-serif; }

        /* ── Log terminal ── */
        .log-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .ws-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .dot-ok { background: #16a34a; }
        .dot-err { background: #dc2626; }
        .dot-wait { background: #f59e0b; }
        .ws-label { font-size: 0.72rem; color: #9ca3af; }
        .fs-link {
            background: none; border: none; width: auto; margin: 0; padding: 0;
            font: inherit; font-size: 0.72rem; color: #9ca3af; cursor: pointer; text-decoration: underline;
        }
        #tagFilters { margin-bottom: 5px; font-size: 0.72rem; color: #6b7280; }
        #tagFilters label { display: inline; margin-right: 7px; font-weight: normal; font-size: 0.72rem; color: #6b7280; }
        #textFilter {
            width: 100%; padding: 7px 9px;
            border: none; border-radius: 6px;
            background: #0f172a; color: #cbd5e1;
            font-family: 'Menlo', 'Consolas', monospace; font-size: 0.72rem;
            margin-bottom: 5px;
        }
        #textFilter::placeholder { color: #475569; }
        #logArea {
            width: 100%; height: 280px; overflow-y: auto;
            background: #0f172a; color: #94a3b8;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.7rem; line-height: 1.65;
            padding: 10px; border-radius: 6px;
            white-space: pre-wrap; word-break: break-all;
        }

        /* ── Fullscreen ── */
        #logSection.fullscreen {
            position: fixed; inset: 0; z-index: 999;
            background: #0f172a; padding: 10px;
            display: flex; flex-direction: column;
        }
        #logSection.fullscreen #logArea { flex: 1; height: auto; border-radius: 0; }
        #logSection.fullscreen .ws-label,
        #logSection.fullscreen #tagFilters label,
        #logSection.fullscreen .fs-link { color: #64748b; }

        /* ── Responsive ── */
        @media (min-width: 600px) {
            body { padding: 32px 20px 48px; }
            #logArea { height: 380px; }
        }
    </style>
</head>
<body>

<div class="hdr">
    <h1>Doorman</h1>
    <div class="hdr-meta">
        <span id="buildInfo">loading...</span> · <a href="https://github.com/potados99/doorman-esp" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
</div>

<div id="safeBanner" class="safe-banner" style="display:none;">
    세이프 모드 — 연속 crash로 BT/자동열림이 비활성화되었습니다. 펌웨어 업데이트 또는 기기 삭제 후 재부팅하세요.
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">대시보드</button>
    <button class="tab" onclick="switchTab('settings')">설정</button>
</div>

<!-- ── Dashboard ── -->
<div id="tab-dashboard" class="tab-panel active">
    <button class="door-btn" onclick="openDoor()">문 열기</button>
    <div id="doorStatus" class="status"></div>

    <div class="auto-row">
        <span>자동 열림</span>
        <button id="autoToggle" class="pill off" onclick="toggleAutoUnlock()">OFF</button>
    </div>

    <div class="section">
        <div class="section-title">실시간 로그</div>
        <div id="logSection">
            <div class="log-head">
                <span class="ws-label"><span id="wsDot" class="ws-dot dot-wait"></span><span id="wsLabel">연결 중...</span></span>
                <button onclick="toggleFullscreen()" id="fsBtn" class="fs-link">전체화면</button>
            </div>
            <div id="tagFilters"></div>
            <input type="text" id="textFilter" placeholder="필터 (MAC, 태그, 키워드)" oninput="renderFilteredLogs()">
            <div id="logArea"></div>
        </div>
    </div>
</div>

<!-- ── Settings ── -->
<div id="tab-settings" class="tab-panel">

    <div class="card">
        <div class="card-label">등록된 기기</div>
        <div id="deviceList"></div>
        <div id="deviceStatus" class="status"></div>
    </div>

    <div class="card">
        <div class="card-label">감지 튜닝</div>
        <div class="hint">진입: 윈도우 내 RSSI 조건 충족 관측이 N회 이상이면 재실</div>
        <label>진입 윈도우 (ms)</label>
        <input id="enterWindow" type="number" min="1000" max="30000" step="1000" value="5000">
        <label>진입 최소 관측 수</label>
        <input id="enterCount" type="number" min="1" max="10" value="3">
        <label>진입 RSSI 임계값 (dBm)</label>
        <input id="rssiThresh" type="number" min="-100" max="0" value="-70">
        <div class="hint" style="margin-top:10px;">퇴실: 신호 없이 이 시간이 지나면 퇴실</div>
        <label>퇴실 타임아웃 (ms)</label>
        <input id="presTimeout" type="number" min="1000" max="60000" step="1000" value="15000">
        <button class="btn btn-blue" onclick="saveTuning()">저장</button>
        <div id="tuningStatus" class="status"></div>
    </div>

    <div class="card">
        <div class="card-label">블루투스 페어링</div>
        <button id="pairBtn" class="btn btn-orange" onclick="togglePairing()">불러오는 중...</button>
        <div id="pairStatus" class="status"></div>
    </div>

    <div class="section">
        <div class="section-title" style="color:#dc2626;">Danger Zone</div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">펌웨어 업데이트</div>
            <input id="file" type="file" accept=".bin,application/octet-stream">
            <button class="btn btn-red" onclick="uploadFirmware()">업로드 및 재부팅</button>
            <progress id="progress" value="0" max="100"></progress>
            <div id="otaStatus" class="status"></div>
        </div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">계정</div>
            <label>사용자명</label>
            <input id="authUser" type="text" maxlength="31" autocomplete="off">
            <label>비밀번호</label>
            <input id="authPass" type="password" maxlength="63">
            <button class="btn btn-red" onclick="updateAuth()">계정 변경</button>
            <div id="authStatus" class="status"></div>
        </div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">WiFi</div>
            <label>SSID</label>
            <input id="wifiSsid" type="text" maxlength="32" autocomplete="off">
            <label>비밀번호</label>
            <input id="wifiPass" type="password" maxlength="63">
            <button class="btn btn-red" onclick="updateWifi()">저장 및 재부팅</button>
            <div id="wifiStatus" class="status"></div>
        </div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">재부팅</div>
            <button class="btn btn-red" onclick="rebootDevice()">기기 재부팅</button>
            <div id="rebootStatus" class="status"></div>
        </div>
    </div>
</div>

<script>
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelectorAll('.tab').forEach(function(t, i) {
        if ((i === 0 && name === 'dashboard') || (i === 1 && name === 'settings')) t.classList.add('active');
    });
}

function show(id, msg, cls) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + cls;
    el.style.display = 'block';
}

function post(url, body, statusId, okMsg, reboot) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    if (body !== null) xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onload = function() {
        if (xhr.status === 200) show(statusId, okMsg, 'ok');
        else show(statusId, 'Error: ' + xhr.responseText, 'err');
    };
    xhr.onerror = function() {
        show(statusId, reboot ? okMsg : '연결 끊김', reboot ? 'ok' : 'err');
    };
    xhr.send(body);
}

function openDoor() {
    show('doorStatus', '전송 중...', 'run');
    post('/api/door/open', null, 'doorStatus', '문이 열렸습니다', false);
}

function toggleAutoUnlock() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/auto-unlock/toggle');
    xhr.onload = function() { if (xhr.status === 200) setAutoBtn(xhr.responseText === 'enabled'); };
    xhr.send(null);
}
function setAutoBtn(on) {
    var btn = document.getElementById('autoToggle');
    btn.textContent = on ? 'ON' : 'OFF';
    btn.className = 'pill ' + (on ? 'on' : 'off');
}
function loadAutoUnlockStatus() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/auto-unlock/status');
    xhr.onload = function() { if (xhr.status === 200) setAutoBtn(xhr.responseText === 'enabled'); };
    xhr.send();
}

function togglePairing() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/pairing/toggle');
    xhr.onload = function() { if (xhr.status === 200) updatePairingBtn(xhr.responseText === 'on'); };
    xhr.send();
}
function updatePairingBtn(on) {
    var btn = document.getElementById('pairBtn');
    btn.textContent = on ? '페어링 중 (탭하여 중지)' : '페어링 시작';
    btn.className = 'btn ' + (on ? 'btn-green' : 'btn-orange');
}
function loadPairingStatus() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/pairing/status');
    xhr.onload = function() { if (xhr.status === 200) updatePairingBtn(xhr.responseText === 'on'); };
    xhr.send();
}

function uploadFirmware() {
    var file = document.getElementById('file').files[0];
    if (!file) { show('otaStatus', '.bin 파일을 선택하세요.', 'err'); return; }
    var bar = document.getElementById('progress');
    bar.style.display = 'block'; bar.value = 0;
    show('otaStatus', '업로드 중...', 'run');
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/firmware/upload');
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    xhr.upload.onprogress = function(e) { if (e.lengthComputable) bar.value = Math.round(e.loaded / e.total * 100); };
    xhr.onload = function() {
        if (xhr.status === 200) { bar.value = 100; show('otaStatus', '업로드 완료. 재부팅 중...', 'ok'); }
        else { show('otaStatus', '실패: ' + xhr.responseText, 'err'); bar.style.display = 'none'; }
    };
    xhr.onerror = function() { show('otaStatus', '연결 끊김. 기기가 재부팅 중일 수 있습니다.', 'ok'); };
    xhr.send(file);
}

function updateAuth() {
    var user = document.getElementById('authUser').value.trim();
    var pass = document.getElementById('authPass').value;
    if (!user || !pass) { show('authStatus', '모든 항목을 입력하세요.', 'err'); return; }
    show('authStatus', '저장 중...', 'run');
    post('/api/auth/update', 'user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass), 'authStatus', '변경 완료. 탭을 닫고 새 인증으로 접속하세요.', false);
}

function updateWifi() {
    var ssid = document.getElementById('wifiSsid').value.trim();
    var pass = document.getElementById('wifiPass').value;
    if (!ssid) { show('wifiStatus', 'SSID를 입력하세요.', 'err'); return; }
    show('wifiStatus', '저장 중...', 'run');
    post('/api/wifi/update', 'ssid=' + encodeURIComponent(ssid) + '&pass=' + encodeURIComponent(pass), 'wifiStatus', '저장됨! 기기 재부팅 중...', true);
}

function rebootDevice() {
    if (!confirm('기기를 재부팅할까요?')) return;
    show('rebootStatus', '재부팅 중...', 'run');
    post('/api/reboot', null, 'rebootStatus', '재부팅 중...', true);
}

function toggleFullscreen() {
    var s = document.getElementById('logSection');
    s.classList.toggle('fullscreen');
    document.getElementById('fsBtn').textContent = s.classList.contains('fullscreen') ? '닫기' : '전체화면';
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { var s = document.getElementById('logSection'); if (s.classList.contains('fullscreen')) toggleFullscreen(); }
});

var MAX_LOG_LINES = 500, rawLogs = [], autoFollow = true;
document.getElementById('logArea').addEventListener('scroll', function() { autoFollow = (this.scrollHeight - this.scrollTop - this.clientHeight) < 50; });
var knownTags = {}, allChecked = true, ws = null, tagRegex = /\) ([a-zA-Z_][a-zA-Z0-9_]*):/;

function extractTag(line) { var m = line.match(tagRegex); return m ? m[1] : null; }

function renderTagFilters() {
    var c = document.getElementById('tagFilters');
    var h = '<label><input type="checkbox" id="tagAll" onchange="toggleAllTags(this.checked)" ' + (allChecked ? 'checked' : '') + '> All</label>';
    var tags = Object.keys(knownTags).sort();
    for (var i = 0; i < tags.length; i++) h += '<label><input type="checkbox" data-tag="' + tags[i] + '" onchange="onTagChange()" ' + (knownTags[tags[i]] ? 'checked' : '') + '> ' + tags[i] + '</label>';
    c.innerHTML = h;
}
function toggleAllTags(checked) {
    allChecked = checked;
    var t = Object.keys(knownTags); for (var i = 0; i < t.length; i++) knownTags[t[i]] = checked;
    renderTagFilters(); renderFilteredLogs();
}
function onTagChange() {
    var boxes = document.querySelectorAll('#tagFilters input[data-tag]'), allOn = true;
    for (var i = 0; i < boxes.length; i++) { knownTags[boxes[i].getAttribute('data-tag')] = boxes[i].checked; if (!boxes[i].checked) allOn = false; }
    allChecked = allOn;
    var a = document.getElementById('tagAll'); if (a) a.checked = allOn;
    renderFilteredLogs();
}
function renderFilteredLogs() {
    var area = document.getElementById('logArea'), tf = document.getElementById('textFilter').value.toLowerCase(), f = [];
    for (var i = 0; i < rawLogs.length; i++) {
        var tag = extractTag(rawLogs[i]);
        if (tag !== null && !knownTags[tag]) continue;
        if (tf && rawLogs[i].toLowerCase().indexOf(tf) === -1) continue;
        f.push(rawLogs[i]);
    }
    area.textContent = f.join('\n');
    if (autoFollow) area.scrollTop = area.scrollHeight;
}

var wsToken = '';
function wsConnect() {
    if (!wsToken) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/ws-token');
        xhr.onload = function() { if (xhr.status === 200) { wsToken = xhr.responseText; wsConnect(); } else setTimeout(wsConnect, 3000); };
        xhr.onerror = function() { setTimeout(wsConnect, 3000); };
        xhr.send(); return;
    }
    var host = location.host || 'doorman.local';
    ws = new WebSocket('ws://' + host + '/ws?token=' + wsToken);
    ws.onopen = function() { document.getElementById('wsDot').className = 'ws-dot dot-ok'; document.getElementById('wsLabel').textContent = '연결됨'; };
    ws.onmessage = function(evt) {
        var lines = evt.data.split('\n'), upd = false;
        for (var i = 0; i < lines.length; i++) {
            var l = lines[i]; if (l === '' && i === lines.length - 1) continue;
            rawLogs.push(l);
            var tag = extractTag(l); if (tag && !(tag in knownTags)) { knownTags[tag] = true; upd = true; }
        }
        if (rawLogs.length > MAX_LOG_LINES) rawLogs = rawLogs.slice(rawLogs.length - MAX_LOG_LINES);
        if (upd) renderTagFilters(); renderFilteredLogs();
    };
    ws.onclose = function() { document.getElementById('wsDot').className = 'ws-dot dot-err'; document.getElementById('wsLabel').textContent = '연결 끊김. 재연결 중...'; setTimeout(wsConnect, 3000); };
    ws.onerror = function() { document.getElementById('wsDot').className = 'ws-dot dot-err'; document.getElementById('wsLabel').textContent = '오류'; ws.close(); };
}
wsConnect();

function loadTuning() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/tuning');
    xhr.onload = function() {
        if (xhr.status === 200) {
            var p = xhr.responseText.split(',');
            document.getElementById('rssiThresh').value = p[0];
            document.getElementById('presTimeout').value = p[1];
            if (p.length > 2) document.getElementById('enterWindow').value = p[2];
            if (p.length > 3) document.getElementById('enterCount').value = p[3];
        }
    };
    xhr.send();
}
function saveTuning() {
    show('tuningStatus', '저장 중...', 'run');
    post('/api/tuning', 'rssi=' + document.getElementById('rssiThresh').value + '&timeout=' + document.getElementById('presTimeout').value + '&enter_window=' + document.getElementById('enterWindow').value + '&enter_count=' + document.getElementById('enterCount').value, 'tuningStatus', '저장됨!', false);
}

function loadDevices() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/devices');
    xhr.onload = function() {
        var c = document.getElementById('deviceList');
        if (xhr.status !== 200) { c.textContent = '기기 목록 로드 실패'; return; }
        var t = xhr.responseText.trim();
        if (!t) { c.innerHTML = ''; return; }
        var macs = t.split('\n'); c.innerHTML = '';
        for (var i = 0; i < macs.length; i++) {
            var mac = macs[i].trim(); if (!mac) continue;
            var d = document.createElement('div'); d.className = 'dev-row';
            var s = document.createElement('span'); s.textContent = mac;
            var b = document.createElement('button'); b.textContent = '삭제'; b.className = 'btn btn-red'; b.setAttribute('data-mac', mac);
            b.onclick = function() { deleteDevice(this.getAttribute('data-mac')); };
            d.appendChild(s); d.appendChild(b); c.appendChild(d);
        }
    };
    xhr.onerror = function() { document.getElementById('deviceList').textContent = '연결 오류'; };
    xhr.send();
}
function deleteDevice(mac) {
    if (!confirm(mac + ' 기기의 본딩을 삭제할까요?\n삭제 후 다시 페어링해야 합니다.')) return;
    show('deviceStatus', mac + ' 삭제 중...', 'run');
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/devices/delete');
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onload = function() { if (xhr.status === 200) { show('deviceStatus', mac + ' 삭제됨', 'ok'); setTimeout(loadDevices, 500); } else show('deviceStatus', '오류: ' + xhr.responseText, 'err'); };
    xhr.onerror = function() { show('deviceStatus', '연결 끊김', 'err'); };
    xhr.send('mac=' + mac);
}

loadTuning(); loadAutoUnlockStatus(); loadDevices(); loadPairingStatus();

(function() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/info');
    xhr.onload = function() {
        if (xhr.status !== 200) return;
        try {
            var info = JSON.parse(xhr.responseText);
            document.getElementById('buildInfo').textContent = info.version + ' · ' + info.date;
            if (info.safe_mode) {
                document.getElementById('safeBanner').style.display = 'block';
                /* 세이프 모드: BT/자동열림 관련 UI 비활성화 */
                document.querySelector('.door-btn').disabled = true;
                var at = document.getElementById('autoToggle'); if (at) at.disabled = true;
                var pb = document.getElementById('pairBtn'); if (pb) pb.disabled = true;
            }
        } catch (e) {
            document.getElementById('buildInfo').textContent = xhr.responseText;
        }
    };
    xhr.send();
})();
</script>
