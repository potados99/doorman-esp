<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doorman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scrollbar-gutter: stable; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.55;
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ── Header ── */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .hdr h1 { font-size: 1.5rem; font-weight: 700; }
        .hdr-actions { display: flex; gap: 6px; }
        .hdr-meta { font-size: 0.72rem; color: #9ca3af; margin-bottom: 14px; }
        .hdr-meta a { color: #9ca3af; text-decoration: none; }
        .hdr-meta a:hover { color: #6b7280; }
        .icon-btn {
            -webkit-appearance: none; appearance: none;
            background: #f3f4f6; border: none; border-radius: 6px;
            padding: 6px 10px; font: inherit; font-size: 0.82rem; font-weight: 600;
            color: #374151; cursor: pointer;
            transition: background 0.12s;
        }
        .icon-btn:active { background: #e5e7eb; }

        /* ── Tabs ── */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #e5e7eb; margin-bottom: 20px; }
        .tab {
            -webkit-appearance: none; appearance: none;
            background: none; border: none; border-bottom: 2px solid transparent;
            padding: 6px 0 10px; margin-bottom: -1px;
            font: inherit; font-size: 0.88rem; font-weight: 600;
            color: #9ca3af; cursor: pointer;
        }
        .tab.active { color: #111; border-bottom-color: #111; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Primary action ── */
        .door-btn {
            display: block; width: 100%;
            padding: 16px;
            background: #16a34a; color: #fff;
            border: none; border-radius: 8px;
            font: inherit; font-size: 1.05rem; font-weight: 700;
            cursor: pointer;
            transition: background 0.12s;
        }
        .door-btn:active { background: #15803d; }

        /* ── Toggle pill ── */
        .auto-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 14px; padding: 12px 14px;
            border: 1px solid #e5e7eb; border-radius: 8px;
        }
        .auto-row span { font-size: 0.88rem; color: #374151; }
        .pill {
            width: auto; padding: 5px 14px; margin: 0;
            border: none; border-radius: 99px;
            font: inherit; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 0.3px; cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pill.off { background: #f3f4f6; color: #9ca3af; }
        .pill.on { background: #16a34a; color: #fff; }

        /* ── Section ── */
        .section { margin-top: 24px; }
        .section-title {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            color: #9ca3af; margin-bottom: 10px;
        }

        /* ── Card (generic) ── */
        .card {
            border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 14px; margin-bottom: 10px;
        }
        .card-label {
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.4px;
            color: #9ca3af; margin-bottom: 10px;
        }

        /* ── Status ── */
        .status { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 0.82rem; display: none; }
        .ok { background: #ecfdf5; color: #065f46; }
        .err { background: #fef2f2; color: #991b1b; }
        .run { background: #eff6ff; color: #1e40af; }

        /* ── Inputs ── */
        label { display: block; font-size: 0.78rem; font-weight: 500; color: #6b7280; margin: 10px 0 3px; }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 9px 10px;
            border: 1px solid #e5e7eb; border-radius: 6px;
            font: inherit; font-size: 0.88rem;
            background: #f9fafb; color: #111;
        }
        input:focus { outline: none; border-color: #2563eb; }
        input[type="file"] { width: 100%; font-size: 0.82rem; margin-top: 4px; }

        /* ── Buttons ── */
        .btn {
            -webkit-appearance: none; appearance: none;
            display: block; width: 100%; padding: 10px;
            border: none; border-radius: 6px;
            font: inherit; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; margin-top: 10px;
            transition: opacity 0.12s;
        }
        .btn:active { opacity: 0.7; }
        .btn-blue { background: #2563eb; color: #fff; }
        .btn-red { background: #dc2626; color: #fff; }
        .btn-orange { background: #ea580c; color: #fff; }
        .btn-green { background: #16a34a; color: #fff; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        progress { width: 100%; height: 4px; margin-top: 8px; display: none; border-radius: 2px; }
        .hint { font-size: 0.75rem; color: #9ca3af; line-height: 1.45; margin-bottom: 6px; }

        /* ── Safe mode banner ── */
        .safe-banner {
            background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px;
            padding: 10px 12px; margin-bottom: 16px;
            font-size: 0.82rem; color: #991b1b; line-height: 1.5;
        }

        /* ── Device status cards ── */
        .device-cards { margin-top: 20px; }
        .status-card {
            position: relative;
            border: 1px solid #e5e7eb;
            border-left: 4px solid var(--status-color, #e5e7eb);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: box-shadow 0.12s;
            --ripple-color: var(--status-color, #e5e7eb);
            --ripple-speed: 1.5s;
        }
        .status-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .status-card::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            box-shadow: 0 0 0 0 var(--ripple-color);
            pointer-events: none;
            opacity: 0;
        }
        .status-card.pulsing::after {
            animation: cardRipple var(--ripple-speed) ease-out infinite;
        }
        .status-card.burst::after {
            animation: burstRipple 0.6s ease-out forwards;
        }
        @keyframes cardRipple {
            0%   { box-shadow: 0 0 0 0   var(--ripple-color); opacity: 1; }
            70%  { box-shadow: 0 0 0 12px var(--ripple-color); opacity: 0; }
            100% { box-shadow: 0 0 0 12px var(--ripple-color); opacity: 0; }
        }
        @keyframes burstRipple {
            0%   { box-shadow: 0 0 0 0   var(--ripple-color); opacity: 1; }
            100% { box-shadow: 0 0 0 20px rgba(22,163,74,0); opacity: 0; }
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 4px;
        }
        .card-alias { font-size: 0.9rem; font-weight: 600; color: #111; }
        .card-mac { font-size: 0.7rem; color: #9ca3af; font-family: 'Menlo', 'Consolas', monospace; }
        .card-status { font-size: 0.78rem; color: #6b7280; }
        .status-card.stale {
            border-left-color: #14532d;
            box-shadow: inset 0 0 0 1px rgba(20, 83, 45, 0.08);
        }
        .status-card.stale .card-status {
            color: #14532d;
            font-weight: 600;
        }

        /* ── Empty state ── */
        .empty-state {
            padding: 28px 0; text-align: center;
            font-size: 0.88rem; color: #9ca3af; line-height: 1.8;
        }

        /* ── Modal (dialog) ── */
        dialog.modal {
            border: none; border-radius: 12px;
            padding: 0; max-width: 480px; width: calc(100vw - 32px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        dialog.modal::backdrop {
            background: rgba(0,0,0,0.35);
        }
        .modal-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .modal-title { font-size: 1rem; font-weight: 700; color: #111; }
        .modal-close {
            -webkit-appearance: none; appearance: none;
            background: none; border: none; width: auto; margin: 0; padding: 0;
            font-size: 1.3rem; line-height: 1; color: #9ca3af; cursor: pointer;
        }
        .modal-close:hover { color: #374151; }
        .modal-body {
            padding: 14px 18px 20px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-status-text {
            font-size: 0.82rem; color: #6b7280;
            margin-bottom: 12px; padding: 8px 10px;
            background: #f9fafb; border-radius: 6px;
        }

        /* ── Pair spinner ── */
        .pair-spinner {
            text-align: center; padding: 20px;
            font-size: 0.9rem; color: #6b7280;
        }
        .pair-events {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pair-event {
            padding: 9px 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
        }
        .pair-event-title {
            font-size: 0.84rem;
            font-weight: 600;
            color: #111;
            margin-bottom: 2px;
        }
        .pair-event-meta {
            font-size: 0.72rem;
            color: #6b7280;
        }
        .pair-empty {
            font-size: 0.78rem;
            color: #9ca3af;
            padding: 2px 0;
        }

        /* ── Log overlay ── */
        #logOverlay {
            position: fixed; inset: 0; z-index: 900;
            background: #0f172a;
            display: none; flex-direction: column;
            padding: 10px;
        }
        #logOverlay.open { display: flex; }
        .log-overlay-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 6px;
        }
        .ws-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .dot-ok { background: #16a34a; }
        .dot-err { background: #dc2626; }
        .dot-wait { background: #f59e0b; }
        .ws-label { font-size: 0.72rem; color: #64748b; }
        .log-close-btn {
            background: none; border: none; width: auto; margin: 0; padding: 0;
            font: inherit; font-size: 0.72rem; color: #64748b; cursor: pointer; text-decoration: underline;
        }
        #tagFilters { margin-bottom: 5px; font-size: 0.72rem; color: #94a3b8; }
        #tagFilters label { display: inline; margin-right: 7px; font-weight: normal; font-size: 0.72rem; color: #64748b; }
        #textFilter {
            width: 100%; padding: 7px 9px;
            border: none; border-radius: 6px;
            background: #1e293b; color: #cbd5e1;
            font-family: 'Menlo', 'Consolas', monospace; font-size: 0.72rem;
            margin-bottom: 5px;
        }
        #textFilter::placeholder { color: #475569; }
        #logArea {
            flex: 1;
            overflow-y: auto;
            background: #0f172a; color: #94a3b8;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.7rem; line-height: 1.65;
            padding: 10px; border-radius: 6px;
            white-space: pre-wrap; word-break: break-all;
        }

        /* ── Responsive ── */
        @media (min-width: 600px) {
            body { padding: 32px 20px 48px; }
        }
    </style>
</head>
<body>

<!-- ── Header ── -->
<div class="hdr">
    <h1>Doorman</h1>
    <div class="hdr-actions">
        <button class="icon-btn" onclick="openPairModal()">+ 기기</button>
        <button class="icon-btn" onclick="openLogOverlay()">&#x1F4CB;</button>
    </div>
</div>
<div class="hdr-meta">
    <span id="buildInfo">loading...</span>
</div>

<div id="safeBanner" class="safe-banner" style="display:none;">
    세이프 모드 — 연속 crash로 BT/자동열림이 비활성화되었습니다. 펌웨어 업데이트 또는 기기 삭제 후 재부팅하세요.
</div>

<!-- ── Tabs ── -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('main')">메인</button>
    <button class="tab" onclick="switchTab('manage')">관리</button>
</div>

<!-- ── 메인 탭 ── -->
<div id="tab-main" class="tab-panel active">
    <button class="door-btn" onclick="openDoor()">문 열기</button>
    <div id="doorStatus" class="status"></div>

    <div class="auto-row">
        <span>자동 열림</span>
        <button id="autoToggle" class="pill off" onclick="toggleAutoUnlock()">OFF</button>
    </div>

    <div class="device-cards" id="deviceCards">
        <!-- 기기 카드들이 여기 렌더링됨 -->
    </div>
</div>

<!-- ── 관리 탭 ── -->
<div id="tab-manage" class="tab-panel">
    <div class="section">
        <div class="section-title" style="color:#dc2626;">Danger Zone</div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">펌웨어 업데이트</div>
            <input id="file" type="file" accept=".bin,application/octet-stream">
            <button class="btn btn-red" onclick="uploadFirmware()">업로드 및 재부팅</button>
            <progress id="progress" value="0" max="100"></progress>
            <div id="otaStatus" class="status"></div>
        </div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">계정</div>
            <label>사용자명</label>
            <input id="authUser" type="text" maxlength="31" autocomplete="off">
            <label>비밀번호</label>
            <input id="authPass" type="password" maxlength="63">
            <button class="btn btn-red" onclick="updateAuth()">계정 변경</button>
            <div id="authStatus" class="status"></div>
        </div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">WiFi</div>
            <label>SSID</label>
            <input id="wifiSsid" type="text" maxlength="32" autocomplete="off">
            <label>비밀번호</label>
            <input id="wifiPass" type="password" maxlength="63">
            <button class="btn btn-red" onclick="updateWifi()">저장 및 재부팅</button>
            <div id="wifiStatus" class="status"></div>
        </div>

        <div class="card" style="border-color:#fecaca;">
            <div class="card-label">재부팅</div>
            <button class="btn btn-red" onclick="rebootDevice()">기기 재부팅</button>
            <div id="rebootStatus" class="status"></div>
        </div>
    </div>
</div>

<!-- ── 기기 상세 모달 ── -->
<dialog id="detailModal" class="modal">
    <div class="modal-head">
        <span class="modal-title" id="modalTitle">기기 상세</span>
        <button class="modal-close" onclick="closeDetailModal()">&times;</button>
    </div>
    <div class="modal-body">
        <div class="modal-status-text" id="modalStatusText"></div>

        <label>별명</label>
        <input id="modalAlias" type="text" maxlength="31">

        <label>진입 RSSI 임계값 (dBm)</label>
        <input id="modalRssi" type="number" min="-100" max="0">

        <label>퇴실 타임아웃 (ms)</label>
        <input id="modalTimeout" type="number" min="1000" max="60000" step="1000">

        <label>진입 윈도우 (ms)</label>
        <input id="modalWindow" type="number" min="1000" max="30000" step="1000">

        <label>진입 최소 관측 수</label>
        <input id="modalCount" type="number" min="1" max="10">

        <button class="btn btn-blue" onclick="saveDeviceConfig()">저장</button>
        <button class="btn btn-red" onclick="deleteCurrentDevice()">기기 삭제</button>
        <div id="modalStatus" class="status"></div>
    </div>
</dialog>

<!-- ── 페어링 모달 ── -->
<dialog id="pairModal" class="modal">
    <div class="modal-head">
        <span class="modal-title">기기 페어링</span>
        <button class="modal-close" onclick="closePairModal()">&times;</button>
    </div>
    <div class="modal-body">
        <div id="pairInfo" class="hint">
            블루투스 설정에서 "Doorman"을 찾아 연결하세요.<br>
            PIN이 필요하면 1234를 입력하세요.
        </div>
        <div id="pairSpinner" class="pair-spinner" style="display:none;">연결 중...</div>
        <div id="pairDone" style="display:none;">
            <span style="color:#16a34a; font-weight:600;">연결됨!</span>
            <div id="pairEvents" class="pair-events"></div>
        </div>
    </div>
</dialog>

<!-- ── 로그 오버레이 ── -->
<div id="logOverlay">
    <div class="log-overlay-head">
        <span class="ws-label">
            <span id="wsDot" class="ws-dot dot-wait"></span>
            <span id="wsLabel">연결 중...</span>
        </span>
        <button class="log-close-btn" onclick="closeLogOverlay()">닫기</button>
    </div>
    <div id="tagFilters"></div>
    <input type="text" id="textFilter" placeholder="필터 (MAC, 태그, 키워드)" oninput="renderFilteredLogs()">
    <div id="logArea"></div>
</div>

<script>
/* ──────────────────────────────────────────
   유틸리티
   ────────────────────────────────────────── */
function show(id, msg, cls) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + cls;
    el.style.display = 'block';
}

function post(url, body, statusId, okMsg, reboot) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    if (body !== null) xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onload = function() {
        if (xhr.status === 200) show(statusId, okMsg, 'ok');
        else show(statusId, 'Error: ' + xhr.responseText, 'err');
    };
    xhr.onerror = function() {
        show(statusId, reboot ? okMsg : '연결 끊김', reboot ? 'ok' : 'err');
    };
    xhr.send(body);
}

function macToId(mac) {
    return mac.replace(/:/g, '');
}

function relativeTime(ms) {
    var sec = Math.floor(ms / 1000);
    if (sec < 60) return sec + '초 전';
    var min = Math.floor(sec / 60);
    if (min < 60) return min + '분 전';
    return Math.floor(min / 60) + '시간 전';
}

/* ──────────────────────────────────────────
   탭 전환
   ────────────────────────────────────────── */
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    var tabNames = ['main', 'manage'];
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
        if (tabNames[i] === name) tabs[i].classList.add('active');
    }
}

/* ──────────────────────────────────────────
   문 열기
   ────────────────────────────────────────── */
function openDoor() {
    show('doorStatus', '전송 중...', 'run');
    post('/api/door/open', null, 'doorStatus', '문이 열렸습니다', false);
}

/* ──────────────────────────────────────────
   자동 열림 토글
   ────────────────────────────────────────── */
function toggleAutoUnlock() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/auto-unlock/toggle');
    xhr.onload = function() { if (xhr.status === 200) setAutoBtn(xhr.responseText === 'enabled'); };
    xhr.send(null);
}
function setAutoBtn(on) {
    var btn = document.getElementById('autoToggle');
    btn.textContent = on ? 'ON' : 'OFF';
    btn.className = 'pill ' + (on ? 'on' : 'off');
}
function loadAutoUnlockStatus() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/auto-unlock/status');
    xhr.onload = function() { if (xhr.status === 200) setAutoBtn(xhr.responseText === 'enabled'); };
    xhr.send();
}

/* ──────────────────────────────────────────
   기기 카드 상태 관리
   ────────────────────────────────────────── */
var deviceData = {};    // mac → {alias, mac, detected, rssi, last_seen_ms, config}
var cardState = {};     // mac → 'absent' | 'detecting' | 'present'
var detectCount = {};   // mac → {cur, need}
var lastBtTime = {};    // mac → Date.now()
var pairEvents = [];    // pairing modal event list
var pairModalSeq = 0;    // stale callback invalidation token
var pairInfoHtml = '블루투스 설정에서 "Doorman"을 찾아 연결하세요.<br>PIN이 필요하면 1234를 입력하세요.';

var STATE_COLORS = {
    absent:    '#e5e7eb',
    detecting: '#f59e0b',
    present:   '#16a34a',
    unlock:    '#16a34a'
};

function renderDeviceCards() {
    var container = document.getElementById('deviceCards');
    var macs = Object.keys(deviceData);
    if (macs.length === 0) {
        container.innerHTML = '<div class="empty-state">등록된 기기가 없습니다.<br>우상단 [+ 기기] 버튼을 눌러 블루투스 기기를 연결하세요.</div>';
        return;
    }
    for (var i = 0; i < macs.length; i++) {
        var mac = macs[i];
        var dev = deviceData[mac];
        var existingCard = document.getElementById('card-' + macToId(mac));
        if (!existingCard) {
            var card = document.createElement('div');
            card.className = 'status-card';
            card.id = 'card-' + macToId(mac);
            card.setAttribute('data-mac', mac);
            card.innerHTML =
                '<div class="card-header">' +
                  '<span class="card-alias"></span>' +
                  '<span class="card-mac"></span>' +
                '</div>' +
                '<div class="card-status"></div>';
            card.addEventListener('click', (function(m) {
                return function() { openDetailModal(m); };
            })(mac));
            card.addEventListener('animationend', function() {
                this.classList.remove('burst');
            });
            container.appendChild(card);
        }
        updateCardDisplay(mac);
    }
    // 삭제된 기기 카드 제거
    var cards = container.querySelectorAll('.status-card');
    for (var j = 0; j < cards.length; j++) {
        var cardMac = cards[j].getAttribute('data-mac');
        if (!deviceData[cardMac]) cards[j].remove();
    }
}

function updateCardDisplay(mac) {
    var card = document.getElementById('card-' + macToId(mac));
    if (!card) return;
    var dev = deviceData[mac];
    if (!dev) return;

    var state = cardState[mac] || (dev.detected ? 'present' : 'absent');
    var color = STATE_COLORS[state] || '#e5e7eb';
    var isStale = state === 'present' && lastBtTime[mac] && (Date.now() - lastBtTime[mac] > 3000);

    card.style.setProperty('--status-color', color);
    card.style.setProperty('--ripple-color', color);
    card.querySelector('.card-alias').textContent = dev.alias || mac;
    card.querySelector('.card-mac').textContent = mac;

    var statusText = '';
    if (state === 'absent') {
        statusText = '미감지';
        card.classList.remove('pulsing');
    } else if (state === 'detecting') {
        var dc = detectCount[mac];
        if (dc) {
            statusText = '감지 중 ' + dc.cur + '/' + dc.need;
        } else {
            statusText = '감지 중';
        }
        card.classList.add('pulsing');
    } else if (state === 'present') {
        var rssiVisible = dev.rssi !== undefined && dev.rssi !== null && dev.rssi !== 0;
        var rssiStr = rssiVisible ? ' · RSSI ' + dev.rssi : '';
        var staleStr = isStale ? ' · 통신 끊김' : '';
        statusText = '재실' + rssiStr + staleStr;
        card.classList.remove('pulsing');
    }

    var statusEl = card.querySelector('.card-status');
    statusEl.textContent = statusText;
    statusEl.className = 'card-status' + (isStale ? ' stale' : '');
    card.classList.toggle('stale', isStale);
}

function updateCardRssi(mac, rssi) {
    if (!deviceData[mac]) return;
    deviceData[mac].rssi = rssi;
    lastBtTime[mac] = Date.now();
    var card = document.getElementById('card-' + macToId(mac));
    if (!card) return;
    card.classList.remove('stale');
    card.querySelector('.card-status').classList.remove('stale');
    // present 상태면 RSSI 갱신 표시
    if (cardState[mac] === 'present') {
        updateCardDisplay(mac);
    }
}

function updateCardState(mac, state, line) {
    if (!deviceData[mac]) return;
    var prev = cardState[mac];
    cardState[mac] = state;

    if (state === 'detecting') {
        // "detecting N/M" 파싱
        var dm = line.match(/detecting (\d+)\/(\d+)/);
        if (dm) detectCount[mac] = { cur: parseInt(dm[1]), need: parseInt(dm[2]) };
        updateCardDisplay(mac);
    } else if (state === 'present') {
        detectCount[mac] = null;
        updateCardDisplay(mac);
    } else if (state === 'absent') {
        detectCount[mac] = null;
        updateCardDisplay(mac);
    } else if (state === 'unlock') {
        // burst 리플 트리거
        var card = document.getElementById('card-' + macToId(mac));
        if (card) {
            card.classList.remove('burst');
            void card.offsetWidth; // reflow
            card.classList.add('burst');
        }
        // unlock 후 present 상태 유지
        cardState[mac] = 'present';
    }
}

function onDevicePaired(mac, name) {
    // 페어링 모달이 열려있으면 "연결됨!" 표시
    var pairModal = document.getElementById('pairModal');
    if (pairModal.open) {
        addPairEvent(name || mac, mac);
        document.getElementById('pairSpinner').style.display = 'none';
        document.getElementById('pairDone').style.display = 'block';
    }
    // 1초 후 기기 목록 갱신
    setTimeout(loadDevices, 1000);
}

function applyFullState(data) {
    if (data.auto_unlock !== undefined) setAutoBtn(data.auto_unlock);
    if (data.devices) {
        // REST 응답을 기준으로 카드 상태를 재구성
        var newData = {};
        var newCardState = {};
        var newDetectCount = {};
        var newLastBtTime = {};
        for (var i = 0; i < data.devices.length; i++) {
            var d = data.devices[i];
            newData[d.mac] = d;
            newCardState[d.mac] = d.detected ? 'present' : 'absent';
            newDetectCount[d.mac] = null;
            if (d.detected) newLastBtTime[d.mac] = Date.now();
        }
        deviceData = newData;
        cardState = newCardState;
        detectCount = newDetectCount;
        lastBtTime = newLastBtTime;
        renderDeviceCards();
    }
}

function loadDevices() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/devices');
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                applyFullState(JSON.parse(xhr.responseText));
            } catch(e) {}
        }
    };
    xhr.send();
}

function renderPairEvents() {
    var box = document.getElementById('pairEvents');
    if (!box) return;
    if (!pairEvents.length) {
        box.innerHTML = '<div class="pair-empty">아직 연결된 기기가 없습니다.</div>';
        return;
    }

    var html = '';
    for (var i = 0; i < pairEvents.length; i++) {
        html += '<div class="pair-event">' +
                    '<div class="pair-event-title">' + escapeHtml(pairEvents[i].title) + '</div>' +
                    '<div class="pair-event-meta">' + escapeHtml(pairEvents[i].meta) + '</div>' +
                '</div>';
    }
    box.innerHTML = html;
}

function addPairEvent(title, meta) {
    pairEvents.push({ title: title, meta: meta });
    if (pairEvents.length > 8) {
        pairEvents = pairEvents.slice(pairEvents.length - 8);
    }
    renderPairEvents();
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function syncPairingState(wantOn, seq, cb) {
    var statusXhr = new XMLHttpRequest();
    statusXhr.open('GET', '/api/pairing/status');
    statusXhr.onload = function() {
        if (seq !== pairModalSeq) return;
        if (statusXhr.status !== 200) {
            if (cb) cb(false, false);
            return;
        }

        var isOn = statusXhr.responseText === 'on';
        if (isOn === wantOn) {
            if (cb) cb(true, isOn);
            return;
        }

        var toggleXhr = new XMLHttpRequest();
        toggleXhr.open('POST', '/api/pairing/toggle');
        toggleXhr.onload = function() {
            if (seq !== pairModalSeq) return;
            if (toggleXhr.status !== 200) {
                if (cb) cb(false, isOn);
                return;
            }
            if (cb) cb(true, toggleXhr.responseText === 'on');
        };
        toggleXhr.onerror = function() {
            if (seq !== pairModalSeq) return;
            if (cb) cb(false, isOn);
        };
        toggleXhr.send(null);
    };
    statusXhr.onerror = function() {
        if (seq !== pairModalSeq) return;
        if (cb) cb(false, false);
    };
    statusXhr.send(null);
}

// stale 감지: present 카드에서 2초마다 확인, 3초 무응답 → stale
setInterval(function() {
    var macs = Object.keys(deviceData);

        var card = document.getElementById('card-' + macToId(mac));

}, 2000);

    var parts = ['mac=' + encodeURIComponent(currentDetailMac)];

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/devices/config');

/* ──────────────────────────────────────────
   로그
   ────────────────────────────────────────── */
var MAX_LOG_LINES = 500;
var rawLogs = [];
var autoFollow = true;
var knownTags = {};
var allChecked = true;
var tagRegex = /\) ([a-zA-Z_][a-zA-Z0-9_]*):/;

document.getElementById('logArea').addEventListener('scroll', function() {
    autoFollow = (this.scrollHeight - this.scrollTop - this.clientHeight) < 50;
});

function extractTag(line) {
    var m = line.match(tagRegex);
    return m ? m[1] : null;
}

function renderTagFilters() {
    var c = document.getElementById('tagFilters');
    var h = '<label><input type="checkbox" id="tagAll" onchange="toggleAllTags(this.checked)" ' + (allChecked ? 'checked' : '') + '> All</label>';
    var tags = Object.keys(knownTags).sort();
    for (var i = 0; i < tags.length; i++) {
        h += '<label><input type="checkbox" data-tag="' + tags[i] + '" onchange="onTagChange()" ' + (knownTags[tags[i]] ? 'checked' : '') + '> ' + tags[i] + '</label>';
    }
    c.innerHTML = h;
}

function toggleAllTags(checked) {
    allChecked = checked;
    var t = Object.keys(knownTags);
    for (var i = 0; i < t.length; i++) knownTags[t[i]] = checked;
    renderTagFilters();
    renderFilteredLogs();
}

function onTagChange() {
    var boxes = document.querySelectorAll('#tagFilters input[data-tag]');
    var allOn = true;
    for (var i = 0; i < boxes.length; i++) {
        knownTags[boxes[i].getAttribute('data-tag')] = boxes[i].checked;
        if (!boxes[i].checked) allOn = false;
    }
    allChecked = allOn;
    var a = document.getElementById('tagAll');
    if (a) a.checked = allOn;
    renderFilteredLogs();
}

function renderFilteredLogs() {
    var area = document.getElementById('logArea');
    var tf = document.getElementById('textFilter').value.toLowerCase();
    var f = [];
    for (var i = 0; i < rawLogs.length; i++) {
        var tag = extractTag(rawLogs[i]);
        if (tag !== null && !knownTags[tag]) continue;
        if (tf && rawLogs[i].toLowerCase().indexOf(tf) === -1) continue;
        f.push(rawLogs[i]);
    }
    area.textContent = f.join('\n');
    if (autoFollow) area.scrollTop = area.scrollHeight;
}

/* ──────────────────────────────────────────
   WS 로그 파싱
   ────────────────────────────────────────── */
var lineBuf = '';
var logDirty = false;
var rafId = 0;

function processWsData(data) {
    var combined = lineBuf + data;
    var lines = combined.split('\n');
    lineBuf = lines[lines.length - 1]; // 불완전 라인 보관

    var tagUpdated = false;
    for (var i = 0; i < lines.length - 1; i++) {
        var l = lines[i];
        if (l === '') continue;
        rawLogs.push(l);
        if (rawLogs.length > MAX_LOG_LINES) rawLogs = rawLogs.slice(rawLogs.length - MAX_LOG_LINES);

        // 태그 수집
        var tag = extractTag(l);
        if (tag && !(tag in knownTags)) { knownTags[tag] = true; tagUpdated = true; }

        // 카드 업데이트
        var bt = l.match(/bt: ([0-9A-F:]{17}) rssi=(-?\d+)/);
        if (bt) { updateCardRssi(bt[1], parseInt(bt[2])); continue; }

        var pair = l.match(/bt: ([0-9A-F:]{17}) paired (.+)/);
        if (pair) { onDevicePaired(pair[1], pair[2]); continue; }

        var blePair = l.match(/BLE auth complete: success=yes addr=([0-9A-F:]{17})/);
        if (blePair) { onDevicePaired(blePair[1], 'BLE 기기'); continue; }

        var sm = l.match(/sm: ([0-9A-F:]{17}) (detecting|present|absent|unlock)/);
        if (sm) { updateCardState(sm[1], sm[2], l); continue; }
    }

    if (tagUpdated) renderTagFilters();
    logDirty = true;
    if (!rafId) rafId = requestAnimationFrame(flushRender);
}

function flushRender() {
    rafId = 0;
    if (logDirty) { renderFilteredLogs(); logDirty = false; }
}

/* ──────────────────────────────────────────
   WS 재연결 (epoch 기반 + REST 동기화)
   ────────────────────────────────────────── */
var wsEpoch = 0;
var syncing = false;
var wsBuffer = [];
var wsToken = '';
var reconnectDelay = 2000;
var ws = null;
var host = location.host || 'doorman.local';

function wsConnect() {
    if (!wsToken) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/ws-token');
        xhr.onload = function() {
            if (xhr.status === 200) { wsToken = xhr.responseText; wsConnect(); }
            else setTimeout(wsConnect, 3000);
        };
        xhr.onerror = function() { setTimeout(wsConnect, 3000); };
        xhr.send();
        return;
    }

    var currentEpoch = ++wsEpoch;
    syncing = true; wsBuffer = [];

    ws = new WebSocket('ws://' + host + '/ws?token=' + wsToken);

    ws.onopen = function() {
        document.getElementById('wsDot').className = 'ws-dot dot-ok';
        document.getElementById('wsLabel').textContent = '연결됨';
        reconnectDelay = 2000;

        // REST로 전체 상태 fetch
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/devices');
        xhr.onload = function() {
            if (currentEpoch !== wsEpoch) return;
            if (xhr.status === 200) {
                try { applyFullState(JSON.parse(xhr.responseText)); } catch(e) {}
            }
            for (var i = 0; i < wsBuffer.length; i++) processWsData(wsBuffer[i]);
            wsBuffer = []; syncing = false;
        };
        xhr.onerror = function() {
            if (currentEpoch !== wsEpoch) return;
            for (var i = 0; i < wsBuffer.length; i++) processWsData(wsBuffer[i]);
            wsBuffer = []; syncing = false;
        };
        xhr.send();
    };

    ws.onmessage = function(evt) {
        if (currentEpoch !== wsEpoch) return;
        if (syncing) wsBuffer.push(evt.data);
        else processWsData(evt.data);
    };

    ws.onclose = function() {
        if (currentEpoch !== wsEpoch) return;
        document.getElementById('wsDot').className = 'ws-dot dot-err';
        document.getElementById('wsLabel').textContent = '연결 끊김. 재연결 중...';
        var delay = Math.min(reconnectDelay + Math.random() * 1000, 30000);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        setTimeout(wsConnect, delay);
    };

    ws.onerror = function() {
        document.getElementById('wsDot').className = 'ws-dot dot-err';
        document.getElementById('wsLabel').textContent = '오류';
        ws.close();
    };
}

function uploadFirmware() {
    var file = document.getElementById('file').files[0];
    if (!file) { show('otaStatus', '.bin 파일을 선택하세요.', 'err'); return; }
    var bar = document.getElementById('progress');

    show('otaStatus', '업로드 중...', 'run');
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/firmware/upload');
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    xhr.upload.onprogress = function(e) { if (e.lengthComputable) bar.value = Math.round(e.loaded / e.total * 100); };
    xhr.onload = function() {
        if (xhr.status === 200) { bar.value = 100; show('otaStatus', '업로드 완료. 재부팅 중...', 'ok'); }
        else { show('otaStatus', '실패: ' + xhr.responseText, 'err'); bar.style.display = 'none'; }
    };
    xhr.onerror = function() { show('otaStatus', '연결 끊김. 기기가 재부팅 중일 수 있습니다.', 'ok'); };
    xhr.send(file);
}

function rebootDevice() {
    if (!confirm('기기를 재부팅할까요?')) return;
    show('rebootStatus', '재부팅 중...', 'run');
    post('/api/reboot', null, 'rebootStatus', '재부팅 중...', true);
}

/* ──────────────────────────────────────────
   초기화
   ────────────────────────────────────────── */
loadAutoUnlockStatus();
wsConnect();

(function() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/info');
    xhr.onload = function() {
        if (xhr.status !== 200) return;
        try {
            var info = JSON.parse(xhr.responseText);
            document.getElementById('buildInfo').textContent = info.version + ' · ' + info.date;
            if (info.safe_mode) {
                document.getElementById('safeBanner').style.display = 'block';
                document.querySelector('.door-btn').disabled = true;
                var at = document.getElementById('autoToggle');
                if (at) at.disabled = true;
            }
        } catch(e) {
            document.getElementById('buildInfo').textContent = xhr.responseText;
        }
    };
    xhr.send();
})();
</script>
