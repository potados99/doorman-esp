<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doorman</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 520px; margin: 0 auto; padding: 16px; line-height: 1.4; color: #1f2328; }
        h1 { font-size: 1.4rem; margin: 0 0 12px; }
        h2 { font-size: 1.1rem; margin: 20px 0 8px; padding-top: 12px; border-top: 1px solid #eee; }
        h2:first-of-type { border-top: none; padding-top: 0; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin: 8px 0 4px; }
        input[type="text"], input[type="password"] { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
        input[type="file"] { width: 100%; box-sizing: border-box; }
        button { width: 100%; margin-top: 10px; padding: 10px 14px; border: 0; border-radius: 8px; background: #1f6feb; color: #fff; font: inherit; cursor: pointer; }
        button:disabled { background: #8b949e; cursor: not-allowed; }
        .btn-danger { background: #da3633; }
        .btn-green { background: #238636; }
        .btn-orange { background: #d29922; }
        progress { width: 100%; height: 18px; margin-top: 10px; display: none; }
        .status { margin-top: 8px; padding: 8px 10px; border-radius: 6px; display: none; font-size: 0.9rem; }
        .ok { background: #dafbe1; color: #116329; }
        .err { background: #ffebe9; color: #a40e26; }
        .run { background: #ddf4ff; color: #0550ae; }

        /* Tabs */
        .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #ddd; }
        .tab { -webkit-appearance: none; appearance: none; padding: 8px 16px; cursor: pointer; border: none; border-radius: 0; background: none; font: inherit; font-weight: 600; color: #656d76; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #1f6feb; border-bottom-color: #1f6feb; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Log area */
        #logArea {
            width: 100%; box-sizing: border-box;
            height: 320px; overflow-y: auto;
            background: #0d1117; color: #c9d1d9;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.75rem; line-height: 1.5;
            padding: 8px; border-radius: 8px;
            white-space: pre-wrap; word-break: break-all;
        }
        #logSection.fullscreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            background: #0d1117;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }
        #logSection.fullscreen #logArea {
            flex: 1;
            height: auto;
            border-radius: 0;
            margin: 0;
        }
        #logSection.fullscreen .ws-status,
        #logSection.fullscreen #tagFilters label,
        #logSection.fullscreen #fsBtn,
        #logSection.fullscreen #textFilter {
            color: #c9d1d9;
        }
        .device-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #eee; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 0.85rem; }
        .device-item button { width: auto; margin: 0; padding: 4px 10px; font-size: 0.8rem; }
        #tagFilters label { display: inline-block; margin-right: 8px; font-weight: normal; cursor: pointer; }
        .ws-status { font-size: 0.8rem; margin-bottom: 6px; color: #656d76; }
        .ws-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
        .dot-ok { background: #238636; }
        .dot-err { background: #da3633; }
        .dot-wait { background: #d29922; }
    </style>
</head>
<body>
    <h1>Doorman</h1>
    <p id="buildInfo" style="font-size:0.75rem;color:#8b949e;margin:-8px 0 12px;">Build: loading...</p>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="tab" onclick="switchTab('settings')">Settings</button>
    </div>

    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-panel active">
        <button class="btn-green" onclick="openDoor()">Open Door</button>
        <div id="doorStatus" class="status"></div>

        <button id="autoToggle" class="btn-orange" onclick="toggleAutoUnlock()">Auto-Unlock: Loading...</button>

        <h2>Live Log</h2>
        <div id="logSection">
            <div class="ws-status"><span id="wsDot" class="dot dot-wait"></span><span id="wsLabel">Connecting...</span></div>
            <div id="tagFilters" style="margin-bottom:6px;font-size:0.8rem;"></div>
            <input type="text" id="textFilter" placeholder="Filter (e.g. C0:5D or Unlock)"
                   oninput="renderFilteredLogs()"
                   style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid #444;border-radius:4px;background:#161b22;color:#c9d1d9;font-family:inherit;font-size:0.8rem;margin-bottom:6px;">
            <button onclick="toggleFullscreen()" id="fsBtn" style="float:right;padding:4px 8px;font-size:0.8rem;margin-bottom:4px;">&#x26F6; Fullscreen</button>
            <div style="clear:both;"></div>
            <div id="logArea"></div>
        </div>
    </div>

    <!-- Settings Tab -->
    <div id="tab-settings" class="tab-panel">
        <!-- Bonded Devices -->
        <h2>Bonded Devices</h2>
        <div id="deviceList">Loading...</div>
        <div id="deviceStatus" class="status"></div>

        <!-- Tuning -->
        <h2>Presence Tuning</h2>
        <p style="font-size:0.85rem;color:#656d76;margin:0 0 8px;">Enter: 윈도우 내 RSSI 조건 충족 관측 N회 이상이면 재실</p>
        <label for="enterWindow">Enter Window (ms)</label>
        <input id="enterWindow" type="number" min="1000" max="30000" step="1000" value="5000">
        <label for="enterCount">Enter Min Count</label>
        <input id="enterCount" type="number" min="1" max="10" value="3">
        <label for="rssiThresh">Enter RSSI Threshold (dBm)</label>
        <input id="rssiThresh" type="number" min="-100" max="0" value="-70">
        <p style="font-size:0.85rem;color:#656d76;margin:12px 0 8px;">Exit: feed 없이 이 시간 지속되면 퇴실</p>
        <label for="presTimeout">Exit Timeout (ms)</label>
        <input id="presTimeout" type="number" min="1000" max="60000" step="1000" value="15000">
        <button onclick="saveTuning()">Save</button>
        <div id="tuningStatus" class="status"></div>

        <!-- Pairing -->
        <h2>Bluetooth Pairing</h2>
        <button id="pairBtn" class="btn-orange" onclick="togglePairing()">Pairing: Loading...</button>
        <div id="pairStatus" class="status"></div>

        <!-- Firmware Update -->
        <h2>Firmware</h2>
        <input id="file" type="file" accept=".bin,application/octet-stream">
        <button onclick="uploadFirmware()">Upload &amp; Reboot</button>
        <progress id="progress" value="0" max="100"></progress>
        <div id="otaStatus" class="status"></div>

        <!-- Account -->
        <h2>Account</h2>
        <label for="authUser">Username</label>
        <input id="authUser" type="text" maxlength="31" autocomplete="off">
        <label for="authPass">Password</label>
        <input id="authPass" type="password" maxlength="63">
        <button onclick="updateAuth()">Update Account</button>
        <div id="authStatus" class="status"></div>

        <!-- WiFi -->
        <h2>WiFi</h2>
        <label for="wifiSsid">SSID</label>
        <input id="wifiSsid" type="text" maxlength="32" autocomplete="off">
        <label for="wifiPass">Password</label>
        <input id="wifiPass" type="password" maxlength="63">
        <button class="btn-danger" onclick="updateWifi()">Save &amp; Reboot</button>
        <div id="wifiStatus" class="status"></div>
    </div>

<script>
/* ── Tab switching ── */
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    /* Find matching tab button by text content */
    document.querySelectorAll('.tab').forEach(function(t) {
        if (t.textContent.toLowerCase() === name.toLowerCase() ||
            (name === 'dashboard' && t.textContent === 'Dashboard') ||
            (name === 'settings' && t.textContent === 'Settings')) {
            t.classList.add('active');
        }
    });
}

/* ── Helpers ── */
function show(id, msg, cls) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + cls;
    el.style.display = 'block';
}

function post(url, body, statusId, okMsg, reboot) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    if (body !== null) {
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    }
    xhr.onload = function() {
        if (xhr.status === 200) {
            show(statusId, okMsg, 'ok');
        } else {
            show(statusId, 'Error: ' + xhr.responseText, 'err');
        }
    };
    xhr.onerror = function() {
        if (reboot) {
            show(statusId, okMsg, 'ok');
        } else {
            show(statusId, 'Connection lost.', 'err');
        }
    };
    xhr.send(body);
}

/* ── Actions ── */
function openDoor() {
    show('doorStatus', 'Sending...', 'run');
    post('/api/door/open', null, 'doorStatus', 'Door opened!', false);
}

function toggleAutoUnlock() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/auto-unlock/toggle');
    xhr.onload = function() {
        if (xhr.status === 200) {
            var enabled = xhr.responseText === 'enabled';
            var btn = document.getElementById('autoToggle');
            btn.textContent = 'Auto-Unlock: ' + (enabled ? 'ON' : 'OFF');
            btn.className = enabled ? 'btn-green' : 'btn-danger';
        }
    };
    xhr.send(null);
}

function loadAutoUnlockStatus() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/auto-unlock/status');
    xhr.onload = function() {
        if (xhr.status === 200) {
            var enabled = xhr.responseText === 'enabled';
            var btn = document.getElementById('autoToggle');
            btn.textContent = 'Auto-Unlock: ' + (enabled ? 'ON' : 'OFF');
            btn.className = enabled ? 'btn-green' : 'btn-danger';
        }
    };
    xhr.send();
}

function togglePairing() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/pairing/toggle');
    xhr.onload = function() {
        if (xhr.status === 200) updatePairingBtn(xhr.responseText === 'on');
    };
    xhr.send();
}

function updatePairingBtn(on) {
    var btn = document.getElementById('pairBtn');
    btn.textContent = on ? 'Pairing: ON (tap to stop)' : 'Pairing: OFF (tap to start)';
    btn.className = on ? 'btn-green' : 'btn-orange';
}

function loadPairingStatus() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/pairing/status');
    xhr.onload = function() {
        if (xhr.status === 200) updatePairingBtn(xhr.responseText === 'on');
    };
    xhr.send();
}

function uploadFirmware() {
    var file = document.getElementById('file').files[0];
    if (!file) { show('otaStatus', 'Select a .bin file first.', 'err'); return; }

    var bar = document.getElementById('progress');
    bar.style.display = 'block';
    bar.value = 0;
    show('otaStatus', 'Uploading...', 'run');

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/firmware/upload');
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) bar.value = Math.round(e.loaded / e.total * 100);
    };
    xhr.onload = function() {
        if (xhr.status === 200) {
            bar.value = 100;
            show('otaStatus', 'Upload complete. Rebooting...', 'ok');
        } else {
            show('otaStatus', 'Failed: ' + xhr.responseText, 'err');
            bar.style.display = 'none';
        }
    };
    xhr.onerror = function() {
        show('otaStatus', 'Connection lost. Device may be rebooting.', 'ok');
    };
    xhr.send(file);
}

function updateAuth() {
    var user = document.getElementById('authUser').value.trim();
    var pass = document.getElementById('authPass').value;
    if (!user || !pass) { show('authStatus', 'Both fields are required.', 'err'); return; }

    show('authStatus', 'Saving...', 'run');
    post('/api/auth/update',
         'user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass),
         'authStatus',
         'Account updated. Close this tab and reconnect to use new credentials.',
         false);
}

function updateWifi() {
    var ssid = document.getElementById('wifiSsid').value.trim();
    var pass = document.getElementById('wifiPass').value;
    if (!ssid) { show('wifiStatus', 'SSID is required.', 'err'); return; }

    show('wifiStatus', 'Saving...', 'run');
    post('/api/wifi/update',
         'ssid=' + encodeURIComponent(ssid) + '&pass=' + encodeURIComponent(pass),
         'wifiStatus',
         'Saved! Device is rebooting...',
         true);
}

/* ── Fullscreen toggle ── */
function toggleFullscreen() {
    var section = document.getElementById('logSection');
    section.classList.toggle('fullscreen');
    var btn = document.getElementById('fsBtn');
    btn.textContent = section.classList.contains('fullscreen') ? '\u2715 Exit' : '\u26F6 Fullscreen';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var section = document.getElementById('logSection');
        if (section.classList.contains('fullscreen')) toggleFullscreen();
    }
});

/* ── WebSocket Log Streaming with Tag Filter ── */
var MAX_LOG_LINES = 500;
var rawLogs = [];
var autoFollow = true;

/* 스크롤 위치로 자동 팔로 on/off. 맨 아래 근처면 팔로, 위로 올리면 정지. */
document.getElementById('logArea').addEventListener('scroll', function() {
    var el = this;
    autoFollow = (el.scrollHeight - el.scrollTop - el.clientHeight) < 50;
});
var knownTags = {};
var allChecked = true;
var ws = null;
var tagRegex = /\) ([a-zA-Z_][a-zA-Z0-9_]*):/;

function extractTag(line) {
    var m = line.match(tagRegex);
    return m ? m[1] : null;
}

function renderTagFilters() {
    var container = document.getElementById('tagFilters');
    var html = '<label><input type="checkbox" id="tagAll" onchange="toggleAllTags(this.checked)" ' + (allChecked ? 'checked' : '') + '> All</label>';
    var tags = Object.keys(knownTags).sort();
    for (var i = 0; i < tags.length; i++) {
        html += '<label><input type="checkbox" data-tag="' + tags[i] + '" onchange="onTagChange()" ' + (knownTags[tags[i]] ? 'checked' : '') + '> ' + tags[i] + '</label>';
    }
    container.innerHTML = html;
}

function toggleAllTags(checked) {
    allChecked = checked;
    var tags = Object.keys(knownTags);
    for (var i = 0; i < tags.length; i++) {
        knownTags[tags[i]] = checked;
    }
    renderTagFilters();
    renderFilteredLogs();
}

function onTagChange() {
    var boxes = document.querySelectorAll('#tagFilters input[data-tag]');
    var allOn = true;
    for (var i = 0; i < boxes.length; i++) {
        knownTags[boxes[i].getAttribute('data-tag')] = boxes[i].checked;
        if (!boxes[i].checked) allOn = false;
    }
    allChecked = allOn;
    var allBox = document.getElementById('tagAll');
    if (allBox) allBox.checked = allOn;
    renderFilteredLogs();
}

function renderFilteredLogs() {
    var area = document.getElementById('logArea');
    var textFilter = document.getElementById('textFilter').value.toLowerCase();
    var filtered = [];
    for (var i = 0; i < rawLogs.length; i++) {
        var tag = extractTag(rawLogs[i]);
        if (tag !== null && !knownTags[tag]) continue;
        if (textFilter && rawLogs[i].toLowerCase().indexOf(textFilter) === -1) continue;
        filtered.push(rawLogs[i]);
    }
    area.textContent = filtered.join('\n');
    /* 맨 아래 근처(50px 이내)일 때만 자동 스크롤. 위로 올렸으면 안 건드림. */
    if (autoFollow) {
        area.scrollTop = area.scrollHeight;
    }
}

function wsConnect() {
    var host = location.host || 'doorman.local';
    var url = 'ws://' + host + '/ws';
    ws = new WebSocket(url);

    ws.onopen = function() {
        document.getElementById('wsDot').className = 'dot dot-ok';
        document.getElementById('wsLabel').textContent = 'Connected';
    };

    ws.onmessage = function(evt) {
        var newLines = evt.data.split('\n');
        var needFilterUpdate = false;

        for (var i = 0; i < newLines.length; i++) {
            var line = newLines[i];
            if (line === '' && i === newLines.length - 1) continue;  /* trailing newline */
            rawLogs.push(line);

            var tag = extractTag(line);
            if (tag && !(tag in knownTags)) {
                knownTags[tag] = true;
                needFilterUpdate = true;
            }
        }

        /* Trim to MAX_LOG_LINES */
        if (rawLogs.length > MAX_LOG_LINES) {
            rawLogs = rawLogs.slice(rawLogs.length - MAX_LOG_LINES);
        }

        if (needFilterUpdate) renderTagFilters();
        renderFilteredLogs();
    };

    ws.onclose = function() {
        document.getElementById('wsDot').className = 'dot dot-err';
        document.getElementById('wsLabel').textContent = 'Disconnected. Reconnecting...';
        setTimeout(wsConnect, 3000);
    };

    ws.onerror = function() {
        document.getElementById('wsDot').className = 'dot dot-err';
        document.getElementById('wsLabel').textContent = 'Error';
        ws.close();
    };
}

wsConnect();

/* ── Load tuning params ── */
function loadTuning() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/tuning');
    xhr.onload = function() {
        if (xhr.status === 200) {
            var parts = xhr.responseText.split(',');
            document.getElementById('rssiThresh').value = parts[0];
            document.getElementById('presTimeout').value = parts[1];
            if (parts.length > 2) document.getElementById('enterWindow').value = parts[2];
            if (parts.length > 3) document.getElementById('enterCount').value = parts[3];
        }
    };
    xhr.send();
}

function saveTuning() {
    var rssi = document.getElementById('rssiThresh').value;
    var timeout = document.getElementById('presTimeout').value;
    var enterWindow = document.getElementById('enterWindow').value;
    var enterCount = document.getElementById('enterCount').value;
    show('tuningStatus', 'Saving...', 'run');
    post('/api/tuning',
         'rssi=' + rssi + '&timeout=' + timeout + '&enter_window=' + enterWindow + '&enter_count=' + enterCount,
         'tuningStatus', 'Saved! (RSSI=' + rssi + ', Timeout=' + timeout + 'ms, Window=' + enterWindow + 'ms, Count=' + enterCount + ')', false);
}

/* ── Bonded Devices ── */
function loadDevices() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/devices');
    xhr.onload = function() {
        var container = document.getElementById('deviceList');
        if (xhr.status !== 200) {
            container.textContent = 'Error loading devices';
            return;
        }
        var text = xhr.responseText.trim();
        if (!text) {
            container.textContent = 'No bonded devices';
            return;
        }
        var macs = text.split('\n');
        container.innerHTML = '';
        for (var i = 0; i < macs.length; i++) {
            var mac = macs[i].trim();
            if (!mac) continue;
            var div = document.createElement('div');
            div.className = 'device-item';
            var span = document.createElement('span');
            span.textContent = mac;
            var btn = document.createElement('button');
            btn.textContent = 'Delete';
            btn.className = 'btn-danger';
            btn.setAttribute('data-mac', mac);
            btn.onclick = function() {
                var m = this.getAttribute('data-mac');
                deleteDevice(m);
            };
            div.appendChild(span);
            div.appendChild(btn);
            container.appendChild(div);
        }
    };
    xhr.onerror = function() {
        document.getElementById('deviceList').textContent = 'Connection error';
    };
    xhr.send();
}

function deleteDevice(mac) {
    show('deviceStatus', 'Deleting ' + mac + '...', 'run');
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/devices/delete');
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onload = function() {
        if (xhr.status === 200) {
            show('deviceStatus', 'Deleted ' + mac, 'ok');
            setTimeout(loadDevices, 500);
        } else {
            show('deviceStatus', 'Error: ' + xhr.responseText, 'err');
        }
    };
    xhr.onerror = function() {
        show('deviceStatus', 'Connection lost.', 'err');
    };
    xhr.send('mac=' + mac);
}

loadTuning();
loadAutoUnlockStatus();
loadDevices();
loadPairingStatus();

/* ── Build info ── */
(function() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/build-info');
    xhr.onload = function() {
        if (xhr.status === 200) {
            document.getElementById('buildInfo').textContent = 'Build: ' + xhr.responseText;
        }
    };
    xhr.send();
})();
</script>
</body>
</html>
