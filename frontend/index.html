<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doorman Firmware Update</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 480px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.4;
        }
        h1 {
            font-size: 1.4rem;
            margin: 0 0 8px;
        }
        p {
            margin: 0 0 16px;
        }
        input, button, progress {
            width: 100%;
            box-sizing: border-box;
        }
        button {
            margin-top: 12px;
            padding: 10px 14px;
            border: 0;
            border-radius: 8px;
            background: #1f6feb;
            color: #fff;
            font: inherit;
            cursor: pointer;
        }
        button:disabled {
            background: #8b949e;
            cursor: not-allowed;
        }
        progress {
            height: 18px;
            margin-top: 12px;
            display: none;
        }
        #status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            display: none;
        }
        .ok { background: #dafbe1; color: #116329; }
        .err { background: #ffebe9; color: #a40e26; }
        .run { background: #ddf4ff; color: #0550ae; }
    </style>
</head>
<body>
    <h1>Doorman</h1>
    <p>Upload a firmware `.bin` file.</p>

    <input id="file" type="file" accept=".bin,application/octet-stream">
    <button id="uploadBtn" type="button" onclick="uploadFirmware()">Upload &amp; Reboot</button>
    <progress id="progress" value="0" max="100"></progress>
    <div id="status"></div>

    <script>
        function setStatus(message, klass) {
            var status = document.getElementById('status');
            status.textContent = message;
            status.className = klass;
            status.style.display = 'block';
        }

        function resetControls() {
            var button = document.getElementById('uploadBtn');
            var progress = document.getElementById('progress');
            button.disabled = false;
            button.textContent = 'Upload & Reboot';
            progress.style.display = 'none';
            progress.value = 0;
        }

        function uploadFirmware() {
            var fileInput = document.getElementById('file');
            var file = fileInput.files[0];
            var button = document.getElementById('uploadBtn');
            var progress = document.getElementById('progress');

            if (!file) {
                setStatus('Select a .bin file first.', 'err');
                return;
            }

            button.disabled = true;
            button.textContent = 'Uploading...';
            progress.style.display = 'block';
            setStatus('Uploading ' + file.name + '...', 'run');

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/firmware/upload', true);
            xhr.setRequestHeader('Content-Type', 'application/octet-stream');

            xhr.upload.onprogress = function (event) {
                if (event.lengthComputable) {
                    progress.value = Math.round((event.loaded / event.total) * 100);
                }
            };

            xhr.onload = function () {
                if (xhr.status === 200) {
                    progress.value = 100;
                    setStatus('Upload complete. Rebooting now.', 'ok');
                } else {
                    setStatus('Upload failed: ' + (xhr.responseText || xhr.statusText || 'unknown error'), 'err');
                    resetControls();
                }
            };

            xhr.onerror = function () {
                setStatus('Connection lost. The device may be rebooting.', 'err');
                resetControls();
            };

            xhr.onabort = function () {
                setStatus('Upload cancelled.', 'err');
                resetControls();
            };

            xhr.send(file);
        }
    </script>
</body>
</html>
