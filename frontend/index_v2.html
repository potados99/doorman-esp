<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Doorman</title>
    <style>
        *:not(dialog) { margin: 0; padding: 0; box-sizing: border-box; }
        dialog { padding: 0; box-sizing: border-box; }
        html { scrollbar-gutter: stable; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.55;
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ── Header ── */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .hdr h1 { font-size: 1.5rem; font-weight: 700; }
        .hdr-actions { display: flex; gap: 6px; }
        .hdr-meta { font-size: 0.72rem; color: #9ca3af; margin-bottom: 14px; }
        .hdr-meta a { color: #9ca3af; text-decoration: none; }
        .hdr-meta a:hover { color: #6b7280; }
        .icon-btn {
            -webkit-appearance: none; appearance: none;
            background: #f3f4f6; border: none; border-radius: 6px;
            padding: 6px 10px; font: inherit; font-size: 0.82rem; font-weight: 600;
            color: #374151; cursor: pointer;
            transition: background 0.12s;
        }
        .icon-btn:active { background: #e5e7eb; }

        /* ── Tabs ── */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #e5e7eb; margin-bottom: 20px; }
        .tab {
            -webkit-appearance: none; appearance: none;
            background: none; border: none; border-bottom: 2px solid transparent;
            padding: 6px 0 10px; margin-bottom: -1px;
            font: inherit; font-size: 0.88rem; font-weight: 600;
            color: #9ca3af; cursor: pointer;
        }
        .tab.active { color: #111; border-bottom-color: #111; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Primary action ── */
        .door-btn {
            display: block; width: 100%;
            padding: 16px;
            background: #16a34a; color: #fff;
            border: none; border-radius: 8px;
            font: inherit; font-size: 1.05rem; font-weight: 700;
            cursor: pointer;
            transition: background 0.12s;
        }
        .door-btn:active { background: #15803d; }

        /* ── Toggle pill ── */
        .auto-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 14px; padding: 12px 14px;
            border: 1px solid #e5e7eb; border-radius: 8px;
        }
        .auto-row span { font-size: 0.88rem; color: #374151; }
        .pill {
            width: auto; padding: 5px 14px; margin: 0;
            border: none; border-radius: 99px;
            font: inherit; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 0.3px; cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pill.off { background: #f3f4f6; color: #9ca3af; }
        .pill.on { background: #16a34a; color: #fff; }

        /* ── Section ── */
        .section { margin-top: 24px; }
        .section-title {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            color: #9ca3af; margin-bottom: 10px;
        }

        /* ── Card (generic) ── */
        .card {
            border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 14px; margin-bottom: 10px;
        }
        .card-label {
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.4px;
            color: #9ca3af; margin-bottom: 10px;
        }

        /* ── Status ── */
        .status { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 0.82rem; display: none; }
        .ok { background: #ecfdf5; color: #065f46; }
        .err { background: #fef2f2; color: #991b1b; }
        .run { background: #eff6ff; color: #1e40af; }

        /* ── Inputs ── */
        label { display: block; font-size: 0.78rem; font-weight: 500; color: #6b7280; margin: 10px 0 3px; }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 9px 10px;
            border: 1px solid #e5e7eb; border-radius: 6px;
            font: inherit; font-size: 0.88rem;
            background: #f9fafb; color: #111;
        }
        input:focus { outline: none; border-color: #2563eb; }
        input[type="file"] { width: 100%; font-size: 0.82rem; margin-top: 4px; }

        /* ── Buttons ── */
        .btn {
            -webkit-appearance: none; appearance: none;
            display: block; width: 100%; padding: 10px;
            border: none; border-radius: 6px;
            font: inherit; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; margin-top: 10px;
            transition: opacity 0.12s;
        }
        .btn:active { opacity: 0.7; }
        .btn-blue { background: #2563eb; color: #fff; }
        .btn-red { background: #dc2626; color: #fff; }
        .btn-orange { background: #ea580c; color: #fff; }
        .btn-green { background: #16a34a; color: #fff; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        progress { width: 100%; height: 4px; margin-top: 8px; display: none; border-radius: 2px; }
        .hint { font-size: 0.75rem; color: #9ca3af; line-height: 1.45; margin-bottom: 6px; }

        /* ── Safe mode banner ── */
        .safe-banner {
            background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px;
            padding: 10px 12px; margin-bottom: 16px;
            font-size: 0.82rem; color: #991b1b; line-height: 1.5;
        }

        /* ── Device status cards ── */
        .device-cards { margin-top: 20px; }
        .status-card {
            position: relative;
            border: 1px solid #e5e7eb;
            border-left: 4px solid var(--status-color, #e5e7eb);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: box-shadow 0.12s;
            --ripple-color: var(--status-color, #e5e7eb);
        }
        .status-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .status-card::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            box-shadow: 0 0 0 0 var(--ripple-color);
            pointer-events: none;
            opacity: 0;
        }
        .status-card.burst::after {
            animation: burstRipple 0.45s ease-out forwards;
        }
        @keyframes burstRipple {
            0%   { box-shadow: 0 0 0 0   var(--ripple-color); opacity: 0.7; }
            100% { box-shadow: 0 0 0 14px var(--ripple-color); opacity: 0; }
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 4px;
        }
        .card-alias { font-size: 0.9rem; font-weight: 600; color: #111; }
        .card-mac { font-size: 0.7rem; color: #9ca3af; font-family: 'Menlo', 'Consolas', monospace; }
        .card-status { font-size: 0.78rem; color: #6b7280; }

        /* ── Empty state ── */
        .empty-state {
            padding: 28px 0; text-align: center;
            font-size: 0.88rem; color: #9ca3af; line-height: 1.8;
        }

        /* ── Modal (dialog) ── */
        dialog.modal {
            border: none; border-radius: 12px;
            padding: 0; max-width: 480px; width: calc(100vw - 32px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            background: #fff;
        }
        /*
         * dialog는 [open] 속성이 있을 때만 보입니다. flex column으로 잡아
         * head/foot은 고정, body만 스크롤되는 구조로 만듭니다.
         * max-height를 dialog 자체에 두어야 작은 화면에서도 viewport를 넘지 않습니다.
         *
         * 100svh (small viewport height): iOS Safari 주소창이 나타나도
         * 항상 "작은 쪽" 기준으로 계산 → 모달이 주소창 뒤로 잘리지 않습니다.
         * 100vh는 주소창 유무와 무관하게 "큰 쪽" 기준이라 iOS에서 위아래가
         * 주소창에 가려지는 문제가 있음. svh 미지원 구형 브라우저는 vh fallback.
         */
        dialog.modal[open] {
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 32px);
            max-height: calc(100svh - 32px);
        }
        dialog.modal::backdrop {
            background: rgba(0,0,0,0.35);
        }
        .modal-head {
            flex: 0 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        .modal-title { font-size: 1rem; font-weight: 700; color: #111; }
        .modal-close {
            -webkit-appearance: none; appearance: none;
            background: none; border: none; width: auto; margin: 0; padding: 0;
            font-size: 1.3rem; line-height: 1; color: #9ca3af; cursor: pointer;
        }
        .modal-close:hover { color: #374151; }
        .modal-body {
            flex: 1 1 auto;
            min-height: 0;             /* flex child가 overflow되도록 허용 */
            overflow-y: auto;
            padding: 14px 18px 16px;
        }
        /*
         * 하단 CTA 바. body가 스크롤되어도 항상 보입니다.
         * ::before로 body 끝부분에 fade를 깔아 컨텐츠가 잘리는 느낌을 부드럽게 합니다.
         */
        .modal-foot {
            flex: 0 0 auto;
            position: relative;
            padding: 12px 18px 16px;
            border-top: 1px solid #e5e7eb;
            background: #fff;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .modal-foot::before {
            content: '';
            position: absolute;
            left: 0; right: 0;
            bottom: 100%;
            height: 18px;
            pointer-events: none;
            background: linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,0));
        }
        .modal-foot .btn { margin: 0; }
        .modal-foot .status { margin: 0; }
        .modal-status-text {
            font-size: 0.82rem; color: #6b7280;
            margin-bottom: 12px; padding: 8px 10px;
            background: #f9fafb; border-radius: 6px;
        }

        /* ── Pair spinner ── */
        .pair-spinner {
            display: flex; align-items: center; justify-content: center;
            gap: 10px;
            padding: 16px 0 4px;
            font-size: 0.85rem; color: #6b7280;
        }
        .pair-spinner::before {
            content: '';
            width: 14px; height: 14px;
            border: 2px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: pair-spin 0.8s linear infinite;
        }
        @keyframes pair-spin {
            to { transform: rotate(360deg); }
        }
        .pair-events {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pair-event {
            padding: 9px 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
        }
        .pair-event-title {
            font-size: 0.84rem;
            font-weight: 600;
            color: #111;
            margin-bottom: 2px;
        }
        .pair-event-meta {
            font-size: 0.72rem;
            color: #6b7280;
        }
        .pair-empty {
            font-size: 0.78rem;
            color: #9ca3af;
            padding: 2px 0;
        }

        /* ── Log overlay ── */
        #logOverlay {
            position: fixed; inset: 0; z-index: 900;
            background: #0f172a;
            display: none; flex-direction: column;
            padding: 10px;
        }
        #logOverlay.open { display: flex; }
        .log-overlay-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 6px;
        }
        .ws-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .dot-ok { background: #16a34a; }
        .dot-err { background: #dc2626; }
        .dot-wait { background: #f59e0b; }
        .ws-label { font-size: 0.72rem; color: #64748b; }
        .log-close-btn {
            -webkit-appearance: none; appearance: none;
            background: #334155; border: none; border-radius: 6px;
            width: auto; margin: 0; padding: 6px 14px;
            font: inherit; font-size: 0.78rem; font-weight: 600;
            color: #e2e8f0; cursor: pointer;
        }
        .log-close-btn:active { background: #475569; }
        #tagFilters { margin-bottom: 5px; font-size: 0.72rem; color: #94a3b8; }
        #tagFilters label { display: inline; margin-right: 7px; font-weight: normal; font-size: 0.72rem; color: #64748b; }
        #textFilter {
            width: 100%; padding: 7px 9px;
            border: none; border-radius: 6px;
            background: #1e293b; color: #cbd5e1;
            font-family: 'Menlo', 'Consolas', monospace; font-size: 0.72rem;
            margin-bottom: 5px;
        }
        #textFilter::placeholder { color: #475569; }
        #logArea {
            flex: 1;
            overflow-y: auto;
            background: #0f172a; color: #94a3b8;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.7rem; line-height: 1.65;
            padding: 10px; border-radius: 6px;
            white-space: pre-wrap; word-break: break-all;
        }

        /* ── Responsive ── */
        @media (min-width: 600px) {
            body { padding: 32px 20px 48px; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<!--
  Import map: esm.sh가 의존성마다 다른 preact 인스턴스를 가져올 수 있어
  (signals 자동 트래킹은 동일 preact options 객체에 hook을 등록), 모든
  preact import를 단일 URL로 핀해 인스턴스를 통일합니다. signals와 query
  가 같은 hook 트리에 들어가야 자동 구독이 작동.
-->
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.29.1",
    "preact/": "https://esm.sh/preact@10.29.1/",
    "@preact/signals": "https://esm.sh/@preact/signals@2?deps=preact@10.29.1",
    "@preact/signals-core": "https://esm.sh/@preact/signals-core@1?deps=preact@10.29.1",
    "htm": "https://esm.sh/htm@3",
    "@tanstack/preact-query": "https://esm.sh/@tanstack/preact-query@5?deps=preact@10.29.1"
  }
}
</script>
<script type="module">
    /**
     * doorman-esp 프론트엔드 v2 — Phase 2 스캐폴드.
     *
     * preact_practice.html과 같은 IIFE 모듈 패턴을 따릅니다.
     * - 모듈 정의 순서가 의존 순서: api → queries → components → render
     * - 외부 노출이 필요한 것만 return
     *
     * Phase 2의 목표: QueryClient 셋업 + /api/info 단일 query로
     * 브라우저 Basic Auth dialog 통과를 검증.
     * retry: 0은 401 init race를 차단합니다 — 인증 실패 시 즉시 에러로
     * 표면화시켜 브라우저 dialog가 처리하도록 합니다.
     */

    import { h, render } from 'preact';
    import { useEffect, useRef } from 'preact/hooks';
    import { signal, computed, effect, useSignal, useComputed } from '@preact/signals';
    import htm from 'htm';
    import {
        QueryClient,
        QueryClientProvider,
        useQuery,
        useMutation,
        useQueryClient,
    } from '@tanstack/preact-query';

    const html = htm.bind(h);
    const queryClient = new QueryClient({
        defaultOptions: {
            queries: {
                retry: 0,           // 401은 즉시 실패 (브라우저 dialog가 처리)
                refetchOnWindowFocus: false,
            },
        },
    });

    const api = (() => {
        async function fetchJSON(path) {
            const res = await fetch(path, { credentials: 'same-origin' });
            if (!res.ok) throw new Error(`${path} ${res.status}`);
            return res.json();
        }
        async function fetchText(path) {
            const res = await fetch(path, { credentials: 'same-origin' });
            if (!res.ok) throw new Error(`${path} ${res.status}`);
            return (await res.text()).trim();
        }
        return { fetchJSON, fetchText };
    })();

    /**
     * state 모듈 — 컴포넌트 외부에서 생성되는 전역 signal 보관소.
     *
     * Preact signals는 Map 같은 비-React 컨테이너에 자유롭게 들어갑니다.
     * 디바이스별 signal은 lazy create — WS에서 처음 본 mac이라도 그 자리에서 만듭니다.
     * devices 쿼리 응답이 도착하면 effect에서 응답에 없는 mac은 reconcile로 정리.
     */
    const state = (() => {
        // mac → { rssi: signal<number|null>, state: signal<string|null>, lastSeen: signal<number> }
        const deviceSignals = new Map();

        function getDeviceSignals(mac) {
            let s = deviceSignals.get(mac);
            if (!s) {
                s = {
                    rssi: signal(null),
                    state: signal(null),
                    lastSeen: signal(0),
                };
                deviceSignals.set(mac, s);
            }
            return s;
        }

        function deleteDevice(mac) {
            deviceSignals.delete(mac);
        }

        function knownMacs() {
            return Array.from(deviceSignals.keys());
        }

        /** WS 연결 상태: 'connecting' | 'open' | 'closed' */
        const wsStatus = signal('closed');

        /** 누적 페어링 이벤트 (최신이 앞) */
        const pairEvents = signal([]);  // [{title, meta, time}]

        function addPairEvent(title, meta) {
            pairEvents.value = [{ title, meta, time: Date.now() }, ...pairEvents.value].slice(0, 50);
        }

        /**
         * 페어링 종료 신호. WS 라우터에서 'paired' 또는 'BLE auth complete' 수신 시 set.
         * PairModal은 이 signal로 spinner ↔ done 화면 전환.
         */
        const pairingDone = signal(false);

        function resetPairing() {
            pairEvents.value = [];
            pairingDone.value = false;
        }

        /** 로그 라인 버퍼 (오래된 것이 앞) */
        const MAX_LOG_LINES = 500;
        const logBuffer = signal([]);

        function appendLog(line) {
            const next = logBuffer.value.length >= MAX_LOG_LINES
                ? [...logBuffer.value.slice(1), line]
                : [...logBuffer.value, line];
            logBuffer.value = next;
        }

        /** monitor 라인에서 추출되는 시스템 통계 */
        const sysStats = signal(null);  // { ramFree, ramTotal, psramFree, psramTotal, tasks }

        return {
            getDeviceSignals, deleteDevice, knownMacs,
            wsStatus, pairEvents, addPairEvent,
            pairingDone, resetPairing,
            logBuffer, appendLog,
            sysStats,
        };
    })();

    /**
     * ws 모듈 — WebSocket 연결 매니저 + line accumulator + 메시지 라우터.
     *
     * 외부에서 wsToken과 queryClient를 주입받아 connect. 책임 분리:
     * - 라인 분리(accumulator): \n 경계로 안전하게, 미완 라인은 buffer에 보관.
     * - 라우팅: 6개 정규식 중 첫 매칭만 액션 (frontend/index.html:1161-1185 동작 보존).
     * - 모든 라인은 무조건 logBuffer에 push (vanilla 동작 보존).
     * - epoch race guard: 재연결 시 진행 중인 핸들러 무력화.
     * - 지수 backoff: 2s → 4s → ... → 30s 캡.
     */
    const ws = (() => {
        let socket = null;
        let lineBuf = '';
        let epoch = 0;
        let reconnectDelay = 2000;
        let pendingReconnect = null;

        const PATTERNS = [
            // bt: <MAC> rssi=<N>
            { re: /bt: ([0-9A-F:]{17}) rssi=(-?\d+)/, action: (m) => {
                const sigs = state.getDeviceSignals(m[1]);
                sigs.rssi.value = parseInt(m[2], 10);
                sigs.lastSeen.value = Date.now();
            }},
            // bt: <MAC> paired <name>
            { re: /bt: ([0-9A-F:]{17}) paired (.+)/, action: (m, _line, queryClient) => {
                state.addPairEvent(`페어링 완료: ${m[2]}`, `MAC ${m[1]}`);
                state.pairingDone.value = true;
                queryClient.invalidateQueries({ queryKey: ['devices'] });
            }},
            // BLE auth complete
            { re: /BLE auth complete: success=yes addr=([0-9A-F:]{17})/, action: (m, _line, queryClient) => {
                state.addPairEvent('BLE 인증 완료', `MAC ${m[1]}`);
                state.pairingDone.value = true;
                queryClient.invalidateQueries({ queryKey: ['devices'] });
            }},
            // sm: <MAC> <state>
            { re: /sm: ([0-9A-F:]{17}) (detecting|present|absent|unlock)/, action: (m, line) => {
                const sigs = state.getDeviceSignals(m[1]);
                sigs.state.value = line.trim();  // 전체 라인 보관 (detecting X/Y 형태 포함)
            }},
            // monitor: ram=A/B psram=C/D tasks=N
            { re: /monitor: ram=(\d+)\/(\d+) psram=(\d+)\/(\d+) tasks=(\d+)/, action: (m) => {
                state.sysStats.value = {
                    ramFree: parseInt(m[1], 10), ramTotal: parseInt(m[2], 10),
                    psramFree: parseInt(m[3], 10), psramTotal: parseInt(m[4], 10),
                    tasks: parseInt(m[5], 10),
                };
            }},
        ];

        function processLine(line, queryClient) {
            if (!line) {
                return;
            }
            state.appendLog(line);
            for (const { re, action } of PATTERNS) {
                const m = line.match(re);
                if (m) {
                    action(m, line, queryClient);
                    break;  // 첫 매칭만
                }
            }
        }

        function connect(token, queryClient) {
            if (socket) {
                try { socket.close(); } catch (e) {}
                socket = null;
            }
            if (pendingReconnect) {
                clearTimeout(pendingReconnect);
                pendingReconnect = null;
            }
            if (!token) {
                state.wsStatus.value = 'closed';
                return;
            }

            const currentEpoch = ++epoch;
            state.wsStatus.value = 'connecting';
            const scheme = location.protocol === 'https:' ? 'wss://' : 'ws://';
            const url = `${scheme}${location.host}/ws?token=${encodeURIComponent(token)}`;
            socket = new WebSocket(url);
            lineBuf = '';

            socket.onopen = () => {
                if (currentEpoch !== epoch) {
                    return;
                }
                state.wsStatus.value = 'open';
                reconnectDelay = 2000;
            };

            socket.onmessage = (evt) => {
                if (currentEpoch !== epoch) {
                    return;
                }
                const data = typeof evt.data === 'string' ? evt.data : '';
                const merged = lineBuf + data;
                const parts = merged.split('\n');
                lineBuf = parts.pop();  // 마지막 (미완 가능)
                for (const p of parts) {
                    processLine(p, queryClient);
                }
            };

            socket.onclose = () => {
                if (currentEpoch !== epoch) {
                    return;
                }
                state.wsStatus.value = 'closed';
                const d = reconnectDelay;
                reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                pendingReconnect = setTimeout(() => connect(token, queryClient), d);
            };

            socket.onerror = () => {
                // onclose가 이어짐 — 별도 처리 불필요
            };
        }

        function disconnect() {
            epoch++;  // 진행 중인 핸들러 무력화
            if (pendingReconnect) {
                clearTimeout(pendingReconnect);
                pendingReconnect = null;
            }
            if (socket) {
                try { socket.close(); } catch (e) {}
                socket = null;
            }
            state.wsStatus.value = 'closed';
        }

        return { connect, disconnect };
    })();

    /**
     * mutations 모듈 — POST 액션을 wrap하는 useMutation 훅 모음.
     *
     * useDoorOpen: 응답은 'OK' 텍스트 (펌웨어 server.cpp door_open_handler).
     * useAutoUnlockToggle: 응답이 'enabled'/'disabled' 텍스트 — onSuccess에서
     *   ['autoUnlock'] 캐시를 직접 setQueryData로 갱신해 refetch 한 번 절약.
     */
    const mutations = (() => {
        function useDoorOpen() {
            return useMutation({
                mutationFn: () => fetch('/api/door/open', {
                    method: 'POST',
                    credentials: 'same-origin',
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
            });
        }
        function useAutoUnlockToggle(queryClient) {
            return useMutation({
                mutationFn: () => fetch('/api/auto-unlock/toggle', {
                    method: 'POST',
                    credentials: 'same-origin',
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text().then((t) => t.trim());
                }),
                onSuccess: (data) => {
                    queryClient.setQueryData(['autoUnlock'], data);
                },
            });
        }
        function useSlackUpdate() {
            return useMutation({
                mutationFn: (url) => fetch('/api/slack/update', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'url=' + encodeURIComponent(url),
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
            });
        }
        function useAuthUpdate() {
            return useMutation({
                mutationFn: ({ user, pass }) => fetch('/api/auth/update', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass),
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
            });
        }
        function useWifiUpdate() {
            return useMutation({
                mutationFn: ({ ssid, pass }) => fetch('/api/wifi/update', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'ssid=' + encodeURIComponent(ssid) + '&pass=' + encodeURIComponent(pass),
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
            });
        }
        function useReboot() {
            return useMutation({
                mutationFn: () => fetch('/api/reboot', {
                    method: 'POST',
                    credentials: 'same-origin',
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
            });
        }
        /**
         * useDeviceConfigSave — 디바이스 별명/감지 파라미터 저장.
         *
         * mac은 필수, 나머지는 빈 문자열/undefined면 form에서 제외 (v1 동작 보존).
         * 성공 시 ['devices'] invalidate로 카드 리프레시.
         */
        function useDeviceConfigSave(queryClient) {
            return useMutation({
                mutationFn: ({ mac, alias, rssi, timeout, win, count }) => {
                    const parts = ['mac=' + encodeURIComponent(mac)];
                    if (alias !== undefined) {
                        parts.push('alias=' + encodeURIComponent(alias));
                    }
                    if (rssi !== '' && rssi !== undefined) {
                        parts.push('rssi=' + encodeURIComponent(rssi));
                    }
                    if (timeout !== '' && timeout !== undefined) {
                        parts.push('timeout=' + encodeURIComponent(timeout));
                    }
                    if (win !== '' && win !== undefined) {
                        parts.push('enter_window=' + encodeURIComponent(win));
                    }
                    if (count !== '' && count !== undefined) {
                        parts.push('enter_count=' + encodeURIComponent(count));
                    }
                    return fetch('/api/devices/config', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: parts.join('&'),
                    }).then((r) => {
                        if (!r.ok) {
                            throw new Error(String(r.status));
                        }
                        return r.text();
                    });
                },
                onSuccess: () => queryClient.invalidateQueries({ queryKey: ['devices'] }),
            });
        }

        /** useDeviceDelete — 본딩 해제. 성공 시 ['devices'] invalidate. */
        function useDeviceDelete(queryClient) {
            return useMutation({
                mutationFn: (mac) => fetch('/api/devices/delete', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'mac=' + encodeURIComponent(mac),
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
                onSuccess: () => queryClient.invalidateQueries({ queryKey: ['devices'] }),
            });
        }

        /**
         * usePairingToggle — 페어링 모드 토글.
         *
         * v1 syncPairingState의 retry 루프는 단순화 — 한 번 호출만.
         * 실패는 mutation.isError로 표면화. 모달이 열릴 때 한 번, 닫힐 때 한 번 호출됨.
         */
        function usePairingToggle(queryClient) {
            return useMutation({
                mutationFn: () => fetch('/api/pairing/toggle', {
                    method: 'POST',
                    credentials: 'same-origin',
                }).then((r) => {
                    if (!r.ok) {
                        throw new Error(String(r.status));
                    }
                    return r.text();
                }),
                onSuccess: () => queryClient.invalidateQueries({ queryKey: ['pairingStatus'] }),
            });
        }

        return {
            useDoorOpen, useAutoUnlockToggle,
            useSlackUpdate, useAuthUpdate, useWifiUpdate, useReboot,
            useDeviceConfigSave, useDeviceDelete, usePairingToggle,
        };
    })();

    /** MAC을 DOM id-safe 형태로. v1과 동일. */
    function macToId(mac) {

        /**
         * DoorButton — POST /api/door/open. 결과는 status div에 표시.
         *
         * isPending/isSuccess/isError 분기로 v1 show('doorStatus', ...) 동작 보존.

        function DoorButton() {
            const m = mutations.useDoorOpen();
            let statusClass = '';

            if (m.isPending) {

        /**
         * AutoUnlockToggle — pill 토글.

        function AutoUnlockToggle({ status }) {

        /**
         * DeviceCard — props로 mac/alias만 받고 RSSI/state는 signal에서 직접 구독.
         *
         * 핵심: 부모 MainTab이 재렌더되지 않아도 sigs.rssi.value 접근으로 이 카드만 갱신.
         * v1 updateCardDisplay (frontend/index.html:663-698) 로직을 React-style로 옮김.
         */
        function DeviceCard({ mac, alias, onClick }) {
            const sigs = state.getDeviceSignals(mac);
            const rssi = sigs.rssi.value;
            const stateLine = sigs.state.value;
            const lastSeen = sigs.lastSeen.value;

            // detecting은 상태가 아닌 이펙트. 색상은 present/absent 두 가지만 (v1 STATE_COLORS).
            let baseState = 'absent';
            let isDetecting = false;
            let detectCur = null;
            let detectNeed = null;
            if (stateLine) {
                if (stateLine.includes('present') || stateLine.includes('unlock')) {
                    baseState = 'present';
                } else if (stateLine.includes('detecting')) {
                    isDetecting = true;
                    const dm = stateLine.match(/detecting (\d+)\/(\d+)/);
                    if (dm) {
                        detectCur = dm[1];
                        detectNeed = dm[2];
                    }
                }
            }
            const color = baseState === 'present' ? '#16a34a' : '#e5e7eb';

            let statusText = '';
            if (isDetecting) {
                statusText = detectCur ? `감지 중 ${detectCur}/${detectNeed}` : '감지 중';
            } else if (baseState === 'absent') {
                statusText = '미감지';
            } else if (baseState === 'present') {
                const rssiStr = (rssi !== null && rssi !== 0) ? ` · RSSI ${rssi}` : '';
                let agoStr = '';
                if (lastSeen) {
                    const sec = Math.floor((Date.now() - lastSeen) / 1000);
                    if (sec >= 1) {
                        agoStr = ` · ${sec}초 전`;
                    }
                }
                statusText = `재실${rssiStr}${agoStr}`;
            }

            return html`
                <div class="status-card"
                     id=${'card-' + macToId(mac)}
                     data-mac=${mac}
                     style=${`--status-color: ${color}; --ripple-color: ${color}`}
                     onClick=${() => onClick && onClick(mac)}>
                    <div class="card-header">
                        <span class="card-alias">${alias || mac}</span>
                        <span class="card-mac">${mac}</span>
                    </div>
                    <div class="card-status">${statusText}</div>
                </div>
            `;
        }

        /** DeviceCards — devices 응답에서 카드 렌더 + 빈 상태. onCardClick은 mac을 받음. */
        function DeviceCards({ devices, onCardClick }) {

        function StatusLine({ mutation, okMsg, runMsg = '전송 중...' }) {

        }

        /** ManageTab — 관리 탭 패널 전체. */
        function ManageTab() {
            return html`
                <div id="tab-manage" class="tab-panel active">
                    <div class="section">
                        <div class="section-title">설정</div>
                        <${SlackSection}/>
                    </div>
                    <div class="section">
                        <div class="section-title" style="color:#dc2626;">Danger Zone</div>
                        <${FirmwareSection}/>
                        <${AuthSection}/>
                        <${WifiSection}/>
                        <${RebootSection}/>
                    </div>
                </div>
            `;
        }

        /**
         * DetailModal — 디바이스 상세 + 설정 편집 모달.
         *
         * mac=null이면 dialog.close(), mac이 set되면 dialog.showModal() (useEffect로 명령형 제어).
         * Preact는 dialog의 open prop을 인식하지 않아 ref + showModal/close가 표준입니다.
         * 폼 값은 mac/device 변경마다 reset (편집 도중 외부 데이터로 덮어쓰지 않으려면
         * 'mac이 바뀐 경우만'으로 더 좁힐 수도 있지만, 상세 모달은 한 번에 하나만 열림).
         *
         * 라이브 상태(재실/감지 중)는 device.detected가 아닌 signal 구독으로 표시 —
         * 카드와 동일한 단일 진실 출처(WS).
         */
        function DetailModal({ mac, device, onClose }) {
            const queryClient = useQueryClient();
            const dialogRef = useRef(null);
            const aliasSig = useSignal('');
            const rssiSig = useSignal('');
            const timeoutSig = useSignal('');
            const winSig = useSignal('');
            const countSig = useSignal('');
            const saveM = mutations.useDeviceConfigSave(queryClient);
            const deleteM = mutations.useDeviceDelete(queryClient);

            /**
             * mac 변경 시에만 폼 reset + mutation reset.
             * device 객체는 ['devices'] invalidate로 매번 새 ref가 오므로 deps에 넣으면
             * 저장 직후 invalidate → reset() 으로 isSuccess가 즉시 사라져 사용자에게
             * 결과가 안 보이는 race가 생깁니다. 같은 mac이면 폼 값을 덮어쓰지 않습니다.
             */
            useEffect(() => {
                if (!mac || !device) {
                    return;
                }
                aliasSig.value = device.alias || '';
                rssiSig.value = device.config?.rssi_threshold ?? device.rssi_threshold ?? '';
                timeoutSig.value = device.config?.presence_timeout_ms ?? device.presence_timeout_ms ?? '';
                winSig.value = device.config?.enter_window_ms ?? device.enter_window_ms ?? '';
                countSig.value = device.config?.enter_min_count ?? device.enter_min_count ?? '';
                saveM.reset();
                deleteM.reset();
            }, [mac]);

            useEffect(() => {
                const d = dialogRef.current;
                if (!d) {
                    return;
                }
                if (mac && !d.open) {
                    d.showModal();
                    document.body.style.overflow = 'hidden';
                } else if (!mac && d.open) {
                    d.close();
                    document.body.style.overflow = '';
                }
            }, [mac]);

            const sigs = mac ? state.getDeviceSignals(mac) : null;
            const liveRssi = sigs?.rssi.value;
            const liveStateLine = sigs?.state.value;
            const liveLastSeen = sigs?.lastSeen.value;
            let statusText = '미감지';
            if (liveStateLine) {
                if (liveStateLine.includes('present') || liveStateLine.includes('unlock')) {
                    const rssiStr = (liveRssi != null && liveRssi !== 0) ? ` · RSSI ${liveRssi}` : '';
                    let agoStr = '';
                    if (liveLastSeen) {
                        const sec = Math.floor((Date.now() - liveLastSeen) / 1000);
                        if (sec >= 1) {
                            agoStr = ` · ${sec}초 전`;
                        }
                    }
                    statusText = `재실${rssiStr}${agoStr}`;
                } else if (liveStateLine.includes('detecting')) {
                    statusText = '감지 중';
                }
            }

            function onSave() {
                if (!mac) {
                    return;
                }
                saveM.mutate({
                    mac,
                    alias: aliasSig.value.trim(),
                    rssi: rssiSig.value,
                    timeout: timeoutSig.value,
                    win: winSig.value,
                    count: countSig.value,
                });
            }

            function onDelete() {
                if (!mac) {
                    return;
                }
                if (!confirm(`${mac} 기기의 본딩을 삭제할까요?\n삭제 후 다시 페어링해야 합니다.`)) {
                    return;
                }
                deleteM.mutate(mac, {
                    onSuccess: () => {
                        /* signal Map 즉시 비움 — query invalidate 비동기 race로 카드가
                         * 잠깐 남는 현상 방지. 모달은 짧은 딜레이 후 닫음 (status 노출). */
                        state.deleteDevice(mac);
                        setTimeout(onClose, 300);
                    },
                });
            }

            return html`
                <dialog ref=${dialogRef} class="modal"
                        onClick=${(e) => { if (e.target === dialogRef.current) { onClose(); } }}
                        onCancel=${(e) => { e.preventDefault(); onClose(); }}>
                    <div class="modal-head">
                        <span class="modal-title">${device?.alias || mac || '기기 상세'}</span>
                        <button class="modal-close" onClick=${onClose}>&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="modal-status-text">${statusText}</div>

                        <label>별명</label>
                        <input type="text" maxlength="31"
                               value=${aliasSig.value}
                               onInput=${(e) => { aliasSig.value = e.target.value; }}/>

                        <div class="section-title" style="margin-top:18px;">진입 감지</div>
                        <div class="hint">윈도우 내 RSSI 조건을 충족하는 관측이 N회 이상이면 재실로 판정합니다.</div>
                        <label>RSSI 임계값 (dBm)</label>
                        <input type="number" min="-100" max="0"
                               value=${rssiSig.value}
                               onInput=${(e) => { rssiSig.value = e.target.value; }}/>
                        <label>윈도우 (ms)</label>
                        <input type="number" min="1000" max="30000" step="1000"
                               value=${winSig.value}
                               onInput=${(e) => { winSig.value = e.target.value; }}/>
                        <label>최소 관측 수</label>
                        <input type="number" min="1" max="10"
                               value=${countSig.value}
                               onInput=${(e) => { countSig.value = e.target.value; }}/>

                        <div class="section-title" style="margin-top:18px;">퇴실 감지</div>
                        <div class="hint">신호 없이 이 시간이 지나면 퇴실로 전환됩니다.</div>
                        <label>타임아웃 (ms)</label>
                        <input type="number" min="1000" max="60000" step="1000"
                               value=${timeoutSig.value}
                               onInput=${(e) => { timeoutSig.value = e.target.value; }}/>
                    </div>
                    <div class="modal-foot">
                        <${StatusLine} mutation=${saveM} okMsg="저장됨!"/>
                        <${StatusLine} mutation=${deleteM} okMsg="삭제됨"/>
                        <button class="btn btn-blue" onClick=${onSave}>저장</button>
                        <button class="btn btn-red" onClick=${onDelete}>기기 삭제</button>
                    </div>
                </dialog>
            `;
        }

        /**
         * PairModal — 페어링 모드 진입 + 결과 표시.
         *
         * open=true 진입 시 pairing toggle을 한 번 호출 (펌웨어가 광고 활성화).
         * close 시 다시 한 번 호출해서 토글 off. v1 syncPairingState의 retry/원하는
         * 상태 추적 루프는 단순화 — 실패는 mutation.isError로 표면화하고 사용자가
         * 다시 열도록 유도.
         *
         * pairingDone signal: WS에서 'paired' 또는 'BLE auth complete' 도착 시 true.
         * UI는 spinner ↔ done 화면 전환만 담당.
         */
        function PairModal({ open, onClose }) {
            const queryClient = useQueryClient();
            const dialogRef = useRef(null);
            const toggleM = mutations.usePairingToggle(queryClient);
            const done = state.pairingDone.value;
            const events = state.pairEvents.value;

            useEffect(() => {
                const d = dialogRef.current;
                if (!d) {
                    return;
                }
                if (open && !d.open) {
                    state.resetPairing();
                    d.showModal();
                    document.body.style.overflow = 'hidden';
                    toggleM.mutate();  // pairing on
                } else if (!open && d.open) {
                    d.close();
                    document.body.style.overflow = '';
                    toggleM.mutate();  // pairing off
                    state.resetPairing();
                }
            }, [open]);

            return html`
                <dialog ref=${dialogRef} class="modal"
                        onClick=${(e) => { if (e.target === dialogRef.current) { onClose(); } }}
                        onCancel=${(e) => { e.preventDefault(); onClose(); }}>
                    <div class="modal-head">
                        <span class="modal-title">기기 페어링</span>
                        <button class="modal-close" onClick=${onClose}>&times;</button>
                    </div>
                    <div class="modal-body">
                        ${!done && html`
                            <div id="pairInfo" class="hint">
                                블루투스 설정에서 "Doorman"을 찾아 연결하세요.
                            </div>
                            <div class="pair-spinner">기기 연결 대기 중</div>
                        `}
                        ${done && html`
                            <div>
                                <span style="color:#16a34a; font-weight:600;">연결됨!</span>
                                <div class="pair-events">
                                    ${events.map((ev, i) => html`
                                        <div class="pair-event" key=${i}>
                                            <div class="pair-event-title">${ev.title}</div>
                                            <div class="pair-event-meta">${ev.meta}</div>
                                        </div>
                                    `)}
                                    ${events.length === 0 && html`<div class="pair-empty">이벤트 없음</div>`}
                                </div>
                            </div>
                        `}
                    </div>
                </dialog>
            `;
        }

        /**
         * App — 쿼리 의존성 체인을 관리하는 루트.
         *
         * info 도착 → enabled 토글 → 나머지 4개 쿼리 fire.
         * wsToken 도착 → ws.connect (cleanup에서 disconnect, epoch 증가로 race 방지).
         * devices 도착 → 응답에 없는 mac은 signal Map에서 정리.
         */
        function App() {
            const queryClient = useQueryClient();

            const info = queries.useInfo();
            const enabled = !!info.data;
            const devices = queries.useDevices(enabled);
            const autoUnlock = queries.useAutoUnlock(enabled);
            const wsToken = queries.useWsToken(enabled);

            useEffect(() => {
                if (!wsToken.data) {
                    return;
                }
                ws.connect(wsToken.data, queryClient);
                return () => ws.disconnect();
            }, [wsToken.data]);

            useEffect(() => {
                if (!devices.data) {
                    return;
                }
                const list = devices.data.devices ?? devices.data ?? [];
                const respMacs = new Set(list.map((d) => d.mac));
                for (const known of state.knownMacs()) {
                    if (!respMacs.has(known)) {
                        state.deleteDevice(known);
                    }
                }
            }, [devices.data]);

            const currentTab = useSignal('main');
            const detailMac = useSignal(null);
            const pairOpen = useSignal(false);

            if (info.isPending) {
                return html`<div style="padding:2rem">로딩…</div>`;
            }
            if (info.isError) {
                return html`<div style="padding:2rem;color:#c00">인증 실패: ${info.error.message}</div>`;
            }

            const devList = devices.data?.devices ?? devices.data ?? [];
            const detailDevice = detailMac.value
                ? devList.find((d) => d.mac === detailMac.value)
                : null;

            return html`
                <${Header} info=${info.data} onPair=${() => { pairOpen.value = true; }}/>
                <${SafeBanner} safeMode=${info.data.safe_mode}/>
                <${Tabs} current=${currentTab}/>
                ${currentTab.value === 'main'
                    ? html`<${MainTab} devices=${devices.data} autoUnlock=${autoUnlock.data}
                                       onCardClick=${(mac) => { detailMac.value = mac; }}/>`
                    : html`<${ManageTab}/>`}
                <${DetailModal} mac=${detailMac.value} device=${detailDevice}
                                onClose=${() => { detailMac.value = null; }}/>
                <${PairModal} open=${pairOpen.value}
                              onClose=${() => { pairOpen.value = false; }}/>
            `;
        }
        return { App };
    })();

    render(html`
        <${QueryClientProvider} client=${queryClient}>
            <${components.App}/>
        </${QueryClientProvider}>
    `, document.getElementById('app'));
</script>
</body>
</html>
